.jump-row{display:flex;gap:8px;margin-bottom:16px}
.jump-input{flex:1;height:42px;border:1px solid #d2e2f0;border-radius:11px;padding:0 12px;font-size:15px;outline:none;background:rgba(255,255,255,.9);-webkit-appearance:none}

.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:#60768b}

.unit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

.unit-progress{height:3px;background:#e5e5ea;border-radius:2px;margin-top:6px;overflow:hidden}
.unit-progress-bar{height:100%;background:#2d8ac5;border-radius:2px}

/* Nav */
.nav-bar{display:flex;align-items:center;gap:12px;min-height:46px;margin-bottom:18px}

.nav-title{font-size:18px;font-weight:800}

.group-label{font-size:15px;font-weight:600}
.group-stat{font-size:12px;color:#86868b}
.word-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.word-swipe{position:relative;overflow:hidden;border-radius:10px}
.ws-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.ws-btn{min-width:50px;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:0 10px;-webkit-appearance:none;outline:none}

.ws-veryhard{background:#ff9500}
.ws-remove{background:#ff3b30}
.ws-restore{background:#34c759}

.word-block.active{background:#fff3e0}
.wb-en{font-weight:700;font-size:16px;color:#1d1d1f;flex:1}
.word-block.active .wb-en{color:#cc6600}
.wb-cn{font-size:14px;color:#86868b;flex:2}
.word-block.active .wb-cn{color:#996633}
.wb-source{font-size:9px;color:#ccc;flex-shrink:0;min-width:32px;text-align:right}
.wb-step{font-size:11px;color:#bbb;white-space:nowrap;display:none}
.word-block.active .wb-step{display:inline}
.wb-count{font-size:9px;color:#aaa;font-weight:600;white-space:nowrap;min-width:20px;text-align:center}
.wb-badge{font-size:10px;font-weight:700;margin-left:2px;padding:1px 5px;border-radius:4px;display:none}
.wb-badge.wb-veryhard{display:inline;background:#ffe0cc;color:#cc6600}
.wb-badge.wb-removed{display:inline;background:#ffe0e0;color:#cc0000}

.btn-row{display:flex;gap:7px;align-items:center}
.btn{height:40px;border:none;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:transform .16s cubic-bezier(.23,1,.32,1),opacity .12s cubic-bezier(.23,1,.32,1),background-color .16s cubic-bezier(.23,1,.32,1);-webkit-appearance:none;outline:none}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-play{flex:3;background:#277fbd;color:#fff}
.btn-play.playing{background:#cc0000}
.btn-play.paused{background:#34c759}
.btn-skipword{flex:1.2;background:#f0f0f5;color:#1d1d1f}
.btn-rewind{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn:disabled{opacity:.35;pointer-events:none}

.empty-msg{text-align:center;color:#86868b;padding:40px;font-size:14px}

.study-mode{display:flex;gap:4px;background:#dfeefa;border-radius:10px;padding:3px;margin:0 0 12px}
.study-mode button{flex:1;border:0;border-radius:8px;padding:8px;background:transparent;color:#6e6e73;font-weight:700;font-size:14px}
.study-mode button.active{background:#fff;color:#007aff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.uf-recite-shell{max-width:520px;margin:0 auto}
.uf-recite-progress{text-align:center;color:#86868b;font-size:13px;margin:3px 0 10px}
.uf-recite-stage{min-height:300px;display:flex;align-items:stretch}
.uf-recite-card{width:100%;background:rgba(255,255,255,.94);border:1px solid #d8e5f1;border-radius:16px;padding:28px 22px;box-shadow:0 8px 24px rgba(48,105,150,.1);touch-action:pan-y;display:flex;flex-direction:column;justify-content:center;gap:18px}
.uf-recite-card.swipe-left{border-color:#34c759;box-shadow:0 8px 18px rgba(52,199,89,.18)}
.uf-recite-card.swipe-right{border-color:#ff9500;box-shadow:0 8px 18px rgba(255,149,0,.18)}
.uf-recite-en{font-size:29px;font-weight:800;line-height:1.2;overflow-wrap:anywhere}
.uf-recite-cn{font-size:17px;line-height:1.55;color:#505057}
.uf-recite-source{font-size:12px;color:#86868b}
.uf-recite-hidden{display:none}
.uf-recite-controls{display:flex;justify-content:center;gap:12px;margin-top:14px}
.uf-recite-btn{width:58px;height:52px;border:0;border-radius:11px;background:#e9e9ee;color:#1d1d1f;font-size:18px;font-weight:700}
.uf-recite-btn:disabled{opacity:.32}
.uf-recite-show{width:88px;background:#007aff;color:#fff;font-size:15px}
.uf-recite-rate{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.uf-recite-rate button{min-height:46px;border:0;border-radius:11px;font-size:14px;font-weight:800}
.uf-recite-familiar{background:#e5f7ec;color:#247a44}
.uf-recite-hard{background:#fff1df;color:#a86513}
.uf-recite-hint{text-align:center;margin-top:12px;color:#86868b;font-size:12px}

  var newP = {}, newC = {}, needsP = false, needsC = false;

  for (var k in oldP) { if (/^(vocab|hb)_[0-9]+$/.test(k)) { needsP = true; break; } }
  for (var k in oldC) { if (/^(vocab|hb)_[0-9]+$/.test(k)) { needsC = true; break; } }

  // Backup before migrating
  if (needsP) localStorage.setItem('uf_prefs_backup', JSON.stringify(oldP));
  if (needsC) localStorage.setItem('uf_counts_backup', JSON.stringify(oldC));

  if (needsP) {
    for (var k in oldP) {
      var m = k.match(/^(vocab|hb)_([0-9]+)$/);
      if (m) {
        var arr = m[1] === 'vocab' ? VOCAB : HONGBAOSHU;
        var idx = parseInt(m[2]);
        if (idx < arr.length) newP[m[1] + '_' + arr[idx].en] = oldP[k];
      } else { newP[k] = oldP[k]; }
    }
    localStorage.setItem('uf_prefs', JSON.stringify(newP));
  }
  if (needsC) {
    for (var k in oldC) {
      var m = k.match(/^(vocab|hb)_([0-9]+)$/);
      if (m) {
        var arr = m[1] === 'vocab' ? VOCAB : HONGBAOSHU;
        var idx = parseInt(m[2]);
        if (idx < arr.length) newC[m[1] + '_' + arr[idx].en] = oldC[k];
      } else { newC[k] = oldC[k]; }
    }
    localStorage.setItem('uf_counts', JSON.stringify(newC));
  }
})();

// ── Build word list from sources (word-based keys) ──
function buildUFWords() {
  var words = [];
  var vvP; try { vvP = JSON.parse(localStorage.getItem('vv_prefs')||'{}'); } catch(e) { vvP = {}; }
  var hbP; try { hbP = JSON.parse(localStorage.getItem('hb_prefs')||'{}'); } catch(e) { hbP = {}; }
  // Scan vocab — iterate words, check by en
  for (var i = 0; i < VOCAB.length; i++) {
    if (vvP[VOCAB[i].en] === 'hard') {
      words.push({key:'vocab_'+VOCAB[i].en, en:VOCAB[i].en, cn:VOCAB[i].cn, source:'vocab', srcIdx:i});
    }
  }
  // Scan hongbaoshu
  for (var i = 0; i < HONGBAOSHU.length; i++) {
    if (hbP[HONGBAOSHU[i].en] === 'hard') {
      words.push({key:'hb_'+HONGBAOSHU[i].en, en:HONGBAOSHU[i].en, cn:HONGBAOSHU[i].cn, source:'hongbaoshu', srcIdx:i});
    }
  }
  return words;
}

function updateBadges() {

// ── Trash view ──

// ── Prefs ──
function setPref(g, w, act) {
  var ws = wordsInUnit(curUnit);
  var lw = w;
  var word = null;
  for (var i = g * GROUP_SIZE; i < Math.min((g+1) * GROUP_SIZE, ws.length); i++) {
    if (i - g * GROUP_SIZE === w) { word = ws[i]; break; }
  }
  if (!word) return;

  var up = ufPrefs();
  if (act === 'reset') delete up[word.key];
  else up[word.key] = act;
  saveUfPrefs(up);
  haptic(18);

  updateBadges();
  // Update group stat
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var gi = 0; gi < groups; gi++) {
    var gStart = gi * GROUP_SIZE, gEnd = Math.min(gStart + GROUP_SIZE, ws.length);
    var gHard = 0;
    for (var wi = gStart; wi < gEnd; wi++) {
      if (up[ws[wi].key] === 'very_hard') gHard++;
    }
    var gh = document.querySelector('#groupContainer .word-group:nth-child('+(gi+1)+') .group-stat');
    if (gh) gh.textContent = (gEnd - gStart) + '词' + (gHard>0?' · '+gHard+'很难':'');
  }
  var el = $('ws' + g + '_' + w);
  if (el) setTimeout(function(){ closeSw(el); }, 200);

}

// ── Step definitions ──
function getWordLabels(g, w) {
  var ws = wordsInUnit(curUnit);
  var wi = g * GROUP_SIZE + w;
  if (wi >= ws.length) return {labels:[], isENs:[]};
  var key = ws[wi].key;
  var up = ufPrefs();
  if (up[key] === 'very_hard') {
    return {
      labels: ['英①','英②','中①','中②','英③','中③','英④','中④','英⑤','中⑤','英⑥','中⑥','英⑦','英⑧','中⑦','英⑨','中⑧'],
      isENs: [true,true,false,false,true,false,true,false,true,false,true,false,true,true,false,true,false]
    };
  }
  // default (12 steps, matching source "hard")
  return {
    labels: ['英①','英②','中①','中②','英③','中③','英④','中④','英⑤','中⑤','英⑥','中⑥'],
    isENs: [true,true,false,false,true,false,true,false,true,false,true,false]
  };
}

// ── Audio URL resolution ──

// HB audio from unit-level JSON bundles (../hb/audio_unit{N}.json)
var hbPreloaded = {};     // globalIdx_lang → blob URL
var hbUnitsLoading = {};  // unitIdx → true | 'loading'
var hbUnitsCbs = {};      // unitIdx → [callbacks]

function loadHbUnitAudio(u, cb) {
  if (hbUnitsLoading[u] === true) { if (cb) cb(); return; }
  if (cb) {
    if (!hbUnitsCbs[u]) hbUnitsCbs[u] = [];
    hbUnitsCbs[u].push(cb);
  }
  if (hbUnitsLoading[u] === 'loading') return;
  hbUnitsLoading[u] = 'loading';

  fetch('../hb/audio_unit' + u + '.json?v=' + TS)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hbUnitsLoading[u] = true;
      for (var w = 0; w < data.words.length; w++) {
        if (!data.words[w]) continue;
        var globalW = u * 30 + w;
        hbPreloaded[globalW + '_en'] = b64toBlobUrl(data.words[w].en);
        hbPreloaded[globalW + '_cn'] = b64toBlobUrl(data.words[w].cn);
      }
      var cbs = hbUnitsCbs[u];
      if (cbs) { cbs.forEach(function(fn) { fn(); }); delete hbUnitsCbs[u]; }
    })
    .catch(function() {
      delete hbUnitsLoading[u];
      var cbs = hbUnitsCbs[u];
      if (cbs) { cbs.forEach(function(fn) { fn('err'); }); delete hbUnitsCbs[u]; }
    });
}

function waitForHbUnit(u, cb) {
  if (hbUnitsLoading[u] === true) { cb(); return; }
  if (!hbUnitsCbs[u]) hbUnitsCbs[u] = [];
  hbUnitsCbs[u].push(cb);
  if (hbUnitsLoading[u] !== 'loading') loadHbUnitAudio(u);
}

function b64toBlobUrl(b64) {
  var raw = atob(b64), bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], {type: 'audio/mpeg'}));
}

function segUrl(g, w, ns) {
  var ws = wordsInUnit(curUnit);
  var wi = g * GROUP_SIZE + w;
  if (wi >= ws.length) return null;
  var word = ws[wi];
  var info = getWordLabels(g, w);
  if (ns >= info.labels.length) return null;
  var isEN = info.isENs[ns], lang = isEN ? 'en' : 'cn';

  if (word.source === 'hongbaoshu') {
    var key = word.srcIdx + '_' + lang;
    if (hbPreloaded[key]) return hbPreloaded[key];
    // Trigger fetch and return null (playWord will retry)
    var u = Math.floor(word.srcIdx / 30);
    loadHbUnitAudio(u);
    return null;
  }
  // vocab: check preloaded cache
  var cacheKey = word.srcIdx + '_' + lang;
  if (preloaded[cacheKey]) return preloaded[cacheKey];
  // Not cached yet — try to load from audio_g file
  var map = AUDIO_MAP[String(word.srcIdx)];
  if (!map) return null;
  return loadVocabAudio(map[0], word.srcIdx, lang);
}

// Audio slots (AB swap)
function getAu(slot) {
  if (slot === 0) { if (!auA) auA = new Audio(); return auA; }
  if (!auB) auB = new Audio(); return auB;
}
function loadAu(slot, url) {
  var au = getAu(slot);
  var prev = slot === 0 ? auUrlA : auUrlB;
  if (prev !== url) { au.src = url; if (slot === 0) auUrlA = url; else auUrlB = url; }
}

// ── Vocab audio from base64 JSON files ──
var audioFilesLoaded = {};
var audioLoadCbs = {};

function fetchAudioFile(fileIdx) {
  if (audioFilesLoaded[fileIdx] === true || audioFilesLoaded[fileIdx] === 'loading') return;
  audioFilesLoaded[fileIdx] = 'loading';

  var audioUrl = '../audio_g' + fileIdx + '.json?v=' + TS;
  fetch(audioUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (window.AudioCacheManager) AudioCacheManager.remember(audioUrl);
      audioFilesLoaded[fileIdx] = true;
      for (var i = 0; i < data.words.length; i++) {
        if (!data.words[i]) continue;
        // Compute which global index this is
        // offset within the file
        var gi = findGlobalIdx(fileIdx, i);
        if (gi >= 0) {
          preloaded[gi + '_en'] = base64ToBlob(data.words[i].en);
          preloaded[gi + '_cn'] = base64ToBlob(data.words[i].cn);
        }
      }
      var cbs = audioLoadCbs[fileIdx];
      if (cbs) { cbs.forEach(function(cb){ cb(); }); delete audioLoadCbs[fileIdx]; }
    })
    .catch(function() {
      delete audioFilesLoaded[fileIdx];
      var cbs = audioLoadCbs[fileIdx];
      if (cbs) { cbs.forEach(function(cb){ cb('err'); }); delete audioLoadCbs[fileIdx]; }
    });
}

function findGlobalIdx(fileIdx, offset) {
  // Inverse of: for global index gi in vocab words:
  // group_idx = gi // 10, file_idx = min(group_idx, 2)
  // offset = count of words before in groups mapping to same file
  var gi = 0, cnt = 0;
  while (gi < VOCAB.length) {
    var gidx = Math.floor(gi / GROUP_SIZE);
    var fidx = Math.min(gidx, MAX_AUDIO_FILES - 1);
    if (fidx === fileIdx) {
      if (cnt === offset) return gi;
      cnt++;
    }
    gi++;
  }
  return -1;
}

function base64ToBlob(b64) {
  var raw = atob(b64);
  var bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], {type: 'audio/mpeg'}));
}

function waitForAudioFile(fileIdx, cb) {
  if (audioFilesLoaded[fileIdx] === true) { cb(); return; }
  if (!audioLoadCbs[fileIdx]) audioLoadCbs[fileIdx] = [];
  audioLoadCbs[fileIdx].push(cb);
  if (audioFilesLoaded[fileIdx] !== 'loading') fetchAudioFile(fileIdx);
}

function loadVocabAudio(fileIdx, srcIdx, lang) {
  var cacheKey = srcIdx + '_' + lang;
  if (preloaded[cacheKey]) return preloaded[cacheKey];
  // Trigger fetch
  fetchAudioFile(fileIdx);
  return null; // Will retry after fetch completes
}

// ── Preload unit audio ──
function preloadUnitAudio(u) {
  for (var k in preloaded) { URL.revokeObjectURL(preloaded[k]); }
  preloaded = {}; preloadDone = false;
  audioFilesLoaded = {};
  for (var k in hbPreloaded) { URL.revokeObjectURL(hbPreloaded[k]); }
  hbPreloaded = {}; hbUnitsLoading = {}; hbUnitsCbs = {};
  var ws = wordsInUnit(u);
  var neededFiles = {};
  var neededHbUnits = {};
  for (var i = 0; i < ws.length; i++) {
    if (ws[i].source === 'vocab') {
      var map = AUDIO_MAP[String(ws[i].srcIdx)];
      if (map) neededFiles[map[0]] = true;
    } else if (ws[i].source === 'hongbaoshu') {
      neededHbUnits[Math.floor(ws[i].srcIdx / 30)] = true;
    }
  }
  var fileList = Object.keys(neededFiles);
  var hbUnitList = Object.keys(neededHbUnits);
  var pending = fileList.length + hbUnitList.length;
  if (pending === 0) { preloadDone = true; return; }
  function done() { pending--; if (pending <= 0) { preloadDone = true; } }
  for (var f = 0; f < fileList.length; f++) {
    waitForAudioFile(parseInt(fileList[f]), done);
  }
  for (var h = 0; h < hbUnitList.length; h++) {
    waitForHbUnit(parseInt(hbUnitList[h]), done);
  }
}

// ── Playback ──
function hl(g, w) {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
  var wb = $('wb' + g + '_' + w);
  if (wb) wb.classList.add('active');
}
function clearHl() {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
}

function nextStepAfter(g, ns, nw) {
  var info = getWordLabels(g, nw);
  if (ns + 1 < info.labels.length) return {step: ns + 1, wIdx: nw};
  if (single) return null;
  var ws = wordsInGroup(g);
  // Skip removed words in group playback
  var up = ufPrefs();
  var showR = $('showRemovedToggle') ? $('showRemovedToggle').checked : false;
  var next = nw + 1;
  while (next < ws.length) {
    if (showR || up[ws[next].key] !== 'removed') break;
    next++;
  }
  if (next < ws.length) return {step: 0, wIdx: next};
  return null;
}

function stop() {
  if (auA) { auA.onended=null; auA.onerror=null; auA.pause(); auA.removeAttribute('src'); }
  if (auB) { auB.onended=null; auB.onerror=null; auB.pause(); auB.removeAttribute('src'); }
  auUrlA = null; auUrlB = null;
  curAudio = null;
  var groups = Math.ceil(wordsInUnit(curUnit).length / GROUP_SIZE);
  for (var gi = 0; gi < groups; gi++) setBtns(gi, false, false);
}

function done() {
  clearHl(); setBtns(curGroup, false, false);
  wIdx = 0; step = 0; paused = false; single = false; curGroup = -1;
}

function onSegEnd() {
  var au = getAu(1 - curSlot);
  curSlot = 1 - curSlot;
  curAudio = au;
  au.playbackRate = 1.0;
  hl(curGroup, wIdx);

  if (step === 0) {
    var ws = wordsInUnit(curUnit);
    var wi = curGroup * GROUP_SIZE + wIdx;
    if (wi < ws.length) {
      var cnts = ufCounts();
      cnts[ws[wi].key] = (cnts[ws[wi].key] || 0) + 1;
      saveUfCounts(cnts);
      updateCount(curGroup, wIdx);
    }
  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(curGroup, step, wIdx);
  if (nx) {
    var url = segUrl(curGroup, nx.wIdx, nx.step);
    if (url) loadAu(1 - curSlot, url);
  }
}

function playWord() {
  var ws = wordsInGroup(curGroup);
  if (wIdx >= ws.length) { done(); return; }

  var url = segUrl(curGroup, wIdx, step);
  if (!url) {
    // Audio not ready — retry after preload
    var word = ws[wIdx];
    if (word.source === 'vocab') {
      var map = AUDIO_MAP[String(word.srcIdx)];
      if (map) {
        waitForAudioFile(map[0], function(err) {
          if (err || curGroup < 0) { done(); return; }
          setBtns(curGroup, true, false);
          playWord();
        });
        setBtns(curGroup, false, true);
        return;
      }
    } else if (word.source === 'hongbaoshu') {
      var u = Math.floor(word.srcIdx / 30);
      waitForHbUnit(u, function(err) {
        if (err || curGroup < 0) { done(); return; }
        setBtns(curGroup, true, false);
        playWord();
      });
      setBtns(curGroup, false, true);
      return;
    }
    done(); return;
  }

  loadAu(curSlot, url);
  var au = getAu(curSlot);
  curAudio = au;
  au.playbackRate = 1.0;
  hl(curGroup, wIdx);

  if (step === 0) {
    var cnts = ufCounts();
    cnts[ws[wIdx].key] = (cnts[ws[wIdx].key] || 0) + 1;
    saveUfCounts(cnts);
    updateCount(curGroup, wIdx);
    recordUfLearningActivity(ws[wIdx]);
  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(curGroup, step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(curGroup, step, wIdx);
  if (nx) {
    var nu = segUrl(curGroup, nx.wIdx, nx.step);
    if (nu) loadAu(1 - curSlot, nu);
  }
}

function setBtns(gIdx, playing, loading) {
  var playIcon = '<path d="M8 5v14l11-7z"/>';
  var pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  var isLoading = !!loading;
  var playBtn = $('btnPlay' + gIdx);
  if (playBtn) {
    var icon = playBtn.querySelector('.play-icon'), label = playBtn.querySelector('.btn-label');
    playBtn.disabled = isLoading;
    playBtn.classList.remove('playing','paused');
    if (isLoading) { icon.innerHTML = playIcon; label.textContent = '加载中…'; }
    else if (playing) { playBtn.classList.add('playing'); icon.innerHTML = pauseIcon; label.textContent = '播放中'; }
    else { icon.innerHTML = playIcon; label.textContent = '朗读'; }
  }
  var skipBtn = $('btnSkipWord' + gIdx);
  if (skipBtn) skipBtn.disabled = isLoading || !playing;
}

function togglePlay(gIdx) {
  if (curGroup === gIdx && curAudio && !curAudio.ended && !curAudio.paused) {
    curAudio.pause(); paused = true; setBtns(gIdx, false, false);
  } else if (curGroup === gIdx && curAudio && paused) {
    curAudio.play(); paused = false; setBtns(gIdx, true, false);
  } else {
    stop();
    curGroup = gIdx; wIdx = 0; step = 0; paused = false; single = false;
    // Skip removed words at start
    var ws = wordsInGroup(gIdx);
    var up = ufPrefs();
    var showR = $('showRemovedToggle') ? $('showRemovedToggle').checked : false;
    while (wIdx < ws.length && !showR && up[ws[wIdx].key] === 'removed') wIdx++;
    if (wIdx >= ws.length) { done(); return; }
    setBtns(gIdx, true, false);
    playWord();
  }
}

function playSingleW(g, w) {
  stop();
  curGroup = g; wIdx = w; step = 0; paused = false; single = true;
  setBtns(g, true, false);
  playWord();
}

function skipWord(gIdx) {
  haptic(10);
  stop();
  curGroup = gIdx; single = false;
  var ws = wordsInGroup(gIdx);
  // Skip past removed words
  var up = ufPrefs();
  var showR = $('showRemovedToggle') ? $('showRemovedToggle').checked : false;
  var next = wIdx + 1;
  while (next < ws.length && !showR && up[ws[next].key] === 'removed') next++;
  if (next >= ws.length) { done(); return; }
  step = 0; wIdx = next;
  setBtns(gIdx, true, false);
  playWord();
}

function doRewind(gIdx) {
  haptic(10);
  stop();
  curGroup = gIdx; wIdx = 0; step = 0; paused = false; single = false;
  // Skip removed words at start
  var ws = wordsInGroup(gIdx);
  var up = ufPrefs();
  var showR = $('showRemovedToggle') ? $('showRemovedToggle').checked : false;
  while (wIdx < ws.length && !showR && up[ws[wIdx].key] === 'removed') wIdx++;
  if (wIdx >= ws.length) { done(); return; }
  setBtns(gIdx, false, false);
}

// ── Counts ──
function updateCount(g, w) {
  var ws = wordsInUnit(curUnit);
  var wi = g * GROUP_SIZE + w;
  if (wi >= ws.length) return;
  var cnts = ufCounts();
  var cnt = cnts[ws[wi].key] || 0;
  var el = document.querySelector('#wb' + g + '_' + w + ' .wb-count');
  if (el) el.textContent = cnt > 0 ? cnt : '';
}
function updateAllCounts() {
  if (curUnit < 0) return;
  var ws = wordsInUnit(curUnit);
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var g = 0; g < groups; g++) {
    for (var w = g * GROUP_SIZE; w < Math.min((g+1) * GROUP_SIZE, ws.length); w++) {
      updateCount(g, w - g * GROUP_SIZE);
    }
  }
}

// ── Swipe ──
var swOpen = null, swCur = null, swBlk = null, swX = 0, swY = 0, swTX = 0;
function closeSw(el) {
  if (!el) el = swOpen;
  if (el) {
    var b = el.querySelector('.word-block');
    if (b) b.style.transform = 'translateX(0)';
    el.classList.remove('swiped');
  }
  if (swOpen === el || !el) swOpen = null;
}

WordsMotion.bindRevealList({root:document,itemSelector:'.word-swipe',contentSelector:'.word-block',width:100,edgeReserve:22});

document.addEventListener('click', function(e){
  if (!e.target.closest('.word-swipe')) closeSw();
  var wsBtn = e.target.closest('.ws-btn');
  if (wsBtn) {
    setPref(parseInt(wsBtn.dataset.g), parseInt(wsBtn.dataset.w), wsBtn.dataset.act);
    return;
  }
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
renderUnits();
function initUfNavigation(){
  if(!history||!history.replaceState)return;history.replaceState({ufView:'units',ufDepth:0},'',location.href);ufNavReady=true;
  addEventListener('popstate',function(e){var s=e.state||{ufView:'units',ufDepth:0};ufRestoring=true;ufDepth=Number(s.ufDepth)||0;stop();if(s.ufView==='groups'&&Number.isFinite(Number(s.unit))){curUnit=Number(s.unit);showView('groups',{fromHistory:true});renderGroups();}else if(s.ufView==='trash'){showView('trash',{fromHistory:true});showTrash();}else{curUnit=-1;curGroup=-1;showView('units',{fromHistory:true});renderUnits();}ufRestoring=false;});
  WordsMotion.installEdgeBack({edge:22,indicator:$('appEdgeBack'),canGoBack:function(){return ufDepth>0},getSurface:function(){return $('view-'+ufActiveView)},onBack:function(){history.back()}});
}
initUfNavigation();
</script>
</body>
</html>
