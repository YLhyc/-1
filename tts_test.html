<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge TTS Browser Test</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f5f5f7}
h2{font-size:18px;margin:16px 0 8px}
textarea{width:100%;height:60px;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:14px;box-sizing:border-box}
.row{display:flex;gap:10px;margin:10px 0}
select,button{padding:10px 16px;border-radius:8px;border:1px solid #ddd;font-size:14px}
button{background:#007aff;color:#fff;border:none;font-weight:600;cursor:pointer}
button:active{opacity:.7}
button:disabled{opacity:.4}
#log{background:#1d1d1f;color:#34c759;border-radius:10px;padding:14px;font-family:monospace;font-size:12px;max-height:300px;overflow-y:auto;white-space:pre-wrap;margin-top:12px}
.log-err{color:#ff3b30}
.log-warn{color:#ff9500}
.log-info{color:#5ac8fa}
</style>
</head>
<body>
<h2>🔊 Edge TTS 浏览器直连测试</h2>

<textarea id="text" placeholder="输入测试文本...">hello world, this is a browser test. 你好世界。</textarea>

<div class="row">
  <select id="voice">
    <option value="en-US-AriaNeural">Aria (EN)</option>
    <option value="zh-CN-XiaoxiaoNeural">晓晓 (CN)</option>
    <option value="zh-CN-YunyangNeural">云扬 (CN)</option>
    <option value="en-US-GuyNeural">Guy (EN)</option>
  </select>
  <button id="btn" onclick="doTTS()">生成语音</button>
  <button onclick="logEl.textContent=''">清空日志</button>
</div>

<audio id="player" controls style="width:100%;margin-top:8px;display:none"></audio>

<div id="log"></div>

<script>
var logEl = document.getElementById('log');
function log(msg, cls) {
  var t = new Date().toLocaleTimeString();
  logEl.innerHTML += '<span class="'+(cls||'')+'">['+t+'] '+msg+'</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Edge TTS protocol constants ──
var TRUSTED_TOKEN = '6A5AA1D4EAFF4E9FB37E23D68491D6F4';
var WSS_URL = 'wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=' + TRUSTED_TOKEN;

function uuidHex() {
  return crypto.randomUUID().replace(/-/g, '');
}

// ── Generate Sec-MS-GEC token ──
async function generateSecMSGec() {
  var WIN_EPOCH = 11644473600;
  var ticks = Date.now() / 1000 + WIN_EPOCH;
  ticks = Math.floor(ticks / 300) * 300;
  ticks *= 1e7 / 100;  // 100-nanosecond intervals
  var strToHash = Math.floor(ticks) + TRUSTED_TOKEN;
  var hashBuffer = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(strToHash));
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function dateToString() {
  return new Date().toUTCString().replace('GMT', 'GMT+0000') + ' (Coordinated Universal Time)';
}

// ── SSML ──
function xmlEscape(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildSSML(text, voice) {
  return '<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">'
    + '<voice name="' + voice + '">'
    + '<prosody pitch="+0Hz" rate="+0%" volume="+0%">'
    + xmlEscape(text)
    + '</prosody></voice></speak>';
}

function configMsg() {
  return 'X-Timestamp:' + dateToString() + '\r\n'
    + 'Content-Type:application/json; charset=utf-8\r\n'
    + 'Path:speech.config\r\n\r\n'
    + '{"context":{"synthesis":{"audio":{"metadataoptions":{'
    + '"sentenceBoundaryEnabled":"false","wordBoundaryEnabled":"false"},'
    + '"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}';
}

function ssmlMsg(requestId, timestamp, ssml) {
  return 'X-RequestId:' + requestId + '\r\n'
    + 'Content-Type:application/ssml+xml\r\n'
    + 'X-Timestamp:' + timestamp + 'Z\r\n'
    + 'Path:ssml\r\n\r\n'
    + ssml;
}

// ── Main ──
async function doTTS() {
  var btn = document.getElementById('btn');
  var player = document.getElementById('player');
  var text = document.getElementById('text').value.trim();
  var voice = document.getElementById('voice').value;
  if (!text) { log('请输入文本', 'log-err'); return; }

  btn.disabled = true;
  btn.textContent = '连接中...';
  player.style.display = 'none';

  try {
    log('Step 1: 生成 Sec-MS-GEC token...', 'log-info');
    var gecToken = await generateSecMSGec();
    var connId = uuidHex();
    var wsUrl = WSS_URL + '&ConnectionId=' + connId
      + '&Sec-MS-GEC=' + gecToken
      + '&Sec-MS-GEC-Version=' + '1-143.0.3650.75';
    log('  Token: ' + gecToken.substring(0,16) + '...', 'log-info');
    log('  WS URL: wss://speech.platform.bing.com/...', 'log-info');

    log('Step 2: 建立 WebSocket 连接...', 'log-info');
    var ws = new WebSocket(wsUrl);
    var audioChunks = [];
    var connected = false;
    var configSent = false;

    await new Promise(function(resolve, reject) {
      var timeout = setTimeout(function() {
        reject(new Error('连接超时 (10s)'));
      }, 10000);

      ws.onopen = function() {
        log('  ✓ WebSocket 已连接', '');
        connected = true;
        log('Step 3: 发送 config + SSML...', 'log-info');
        ws.send(configMsg());
        configSent = true;
        var requestId = uuidHex();
        var timestamp = dateToString();
        var ssml = buildSSML(text, voice);
        log('  SSML: ' + ssml.substring(0, 100) + '...', 'log-info');
        ws.send(ssmlMsg(requestId, timestamp, ssml));
      };

      ws.onmessage = function(e) {
        if (typeof e.data === 'string') {
          // Text messages: turn.start, turn.end, response
          var pathMatch = e.data.match(/Path:(.+)/);
          var path = pathMatch ? pathMatch[1].trim() : 'unknown';
          if (path === 'turn.start') {
            log('  ← 服务器开始处理', 'log-info');
          } else if (path === 'turn.end') {
            log('  ← 服务器处理完毕', 'log-info');
          } else if (path === 'response') {
            log('  ← 服务端响应', 'log-info');
          } else if (path.includes('audio.metadata')) {
            log('  ← 音频元数据', 'log-info');
          } else {
            log('  ← 文本消息: ' + path, 'log-info');
          }
        } else if (e.data instanceof Blob) {
          e.data.arrayBuffer().then(function(buf) {
            var bytes = new Uint8Array(buf);
            if (bytes.length < 2) {
              log('  ⚠ 过短的二进制消息: ' + bytes.length + 'B', 'log-warn');
              return;
            }
            var headerLen = (bytes[0] << 8) | bytes[1];
            if (headerLen >= bytes.length) {
              log('  ⚠ headerLen=' + headerLen + ' >= dataLen=' + bytes.length, 'log-warn');
              return;
            }
            // Check Path header
            var headerBytes = bytes.slice(2, 2 + headerLen);
            var headerText = new TextDecoder().decode(headerBytes);
            var pathMatch = headerText.match(/Path:(.+)/);
            var path = pathMatch ? pathMatch[1].trim() : 'unknown';

            if (path === 'audio') {
              var audioData = bytes.slice(2 + headerLen);
              if (audioData.length > 0) {
                audioChunks.push(audioData);
              }
            } else {
              log('  ← 未知二进制路径: ' + path, 'log-warn');
            }
          });
        }
      };

      ws.onclose = function(e) {
        clearTimeout(timeout);
        if (connected) {
          log('  WebSocket 关闭: code=' + e.code + ' reason=' + e.reason, 'log-info');
          if (audioChunks.length > 0) {
            log('Step 4: 组装音频 (' + audioChunks.length + ' 个片段)...', 'log-info');
            resolve();
          } else {
            reject(new Error('未收到音频数据 (code=' + e.code + ')'));
          }
        } else {
          reject(new Error('连接失败: code=' + e.code + ' reason=' + e.reason));
        }
      };

      ws.onerror = function(e) {
        log('  ⚠ WebSocket error', 'log-warn');
        // onclose will fire next
      };
    });

    // Assemble audio blob
    var totalBytes = audioChunks.reduce(function(s, c) { return s + c.length; }, 0);
    var merged = new Uint8Array(totalBytes);
    var offset = 0;
    for (var i = 0; i < audioChunks.length; i++) {
      merged.set(audioChunks[i], offset);
      offset += audioChunks[i].length;
    }
    var blob = new Blob([merged], { type: 'audio/mpeg' });
    var url = URL.createObjectURL(blob);
    player.src = url;
    player.style.display = 'block';
    player.play();
    log('✓ 成功! 音频 ' + totalBytes + ' bytes, 时长约 ' + (totalBytes*8/48000).toFixed(1) + 's', '');

    // Cleanup old URL after load
    var oldUrl = url;
    player.onloadeddata = function() { URL.revokeObjectURL(oldUrl); };

  } catch(e) {
    log('✗ 失败: ' + e.message, 'log-err');
    if (e.message.includes('连接失败') || e.message.includes('超时')) {
      log('  结论: Microsoft 可能拒绝了浏览器的 Origin/User-Agent', 'log-warn');
    }
  }

  btn.disabled = false;
  btn.textContent = '生成语音';
}
</script>
</body>
</html>
