<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>考研每日晨报</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="fsrs.js"></script>
<style>
:root {
  --bg: #f5f3ef; --card: #fff; --text: #2c2416; --text2: #6b6150;
  --border: #e7e0d5; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --radius: 14px; --hdr: #1a1a2e; --hdr-txt: #f0ede5;
  --c706: #c77d20; --c706-l: #fdf0e0; --c706-bg: #fef9f3;
  --c807: #2e7d8c; --c807-l: #dff2f5; --c807-bg: #f3fafb;
  --cen: #b8485e; --cen-l: #fce8ec; --cen-bg: #fef6f7;
  --tts: #e87040; --tree-line: #d0cbc2;
  --font: -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #1c1a16; --card: #2a2722; --text: #e8e2d5; --text2: #a09884; --border: #3a3630; --shadow: 0 1px 4px rgba(0,0,0,.3); --c706-l: #3d2a18; --c706-bg: #2a2218; --c807-l: #1a2d32; --c807-bg: #1a2428; --cen-l: #3a1a24; --cen-bg: #2a1a20; --tree-line: #4a4540; }
}
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; padding-bottom:env(safe-area-inset-bottom,20px); }

/* Header */
.header { background:var(--hdr); color:var(--hdr-txt); padding:16px 20px 12px; text-align:center; }
.header h1 { font-size:1rem; font-weight:700; letter-spacing:.02em; }
.header .date { font-size:.72rem; opacity:.6; margin-top:2px; }
.container { max-width:600px; margin:0 auto; padding:12px 14px 24px; }

/* Dashboard */
.dash { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.dc { background:var(--card); border-radius:var(--radius); padding:13px 10px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--border); cursor:pointer; transition:transform .15s; -webkit-tap-highlight-color:transparent; }
.dc:active { transform:scale(.97); }
.dc .icon { font-size:1.4rem; margin-bottom:2px; }
.dc .name { font-size:.72rem; font-weight:600; color:var(--text2); }
.dc .bar-wrap { background:#e0dcd4; border-radius:99px; height:5px; margin:7px 0 3px; overflow:hidden; }
@media (prefers-color-scheme: dark) { .dc .bar-wrap { background:#3a3630; } }
.dc .bar { height:100%; border-radius:99px; transition:width .4s; }
.dc.c706 .bar { background:var(--c706); } .dc.c706 .pct { color:var(--c706); }
.dc.c807 .bar { background:var(--c807); } .dc.c807 .pct { color:var(--c807); }
.dc.cen .bar { background:var(--cen); } .dc.cen .pct { color:var(--cen); }
.dc .pct { font-size:.8rem; font-weight:700; }
.dc .info { font-size:.68rem; color:var(--text2); margin-top:1px; }

/* Back button */
.back-bar { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.back-btn { font-size:.85rem; padding:7px 14px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.back-btn:active { transform:scale(.95); }

/* Subject detail header */
.subj-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:12px 14px; background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); }
.subj-hdr .dot { width:10px; height:10px; border-radius:99px; flex-shrink:0; }
.subj-hdr .sh-title { font-weight:700; font-size:1rem; }
.subj-hdr .sh-info { font-size:.75rem; color:var(--text2); }

/* Trend stats */
.trend { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.trend-item { background:var(--card); border-radius:var(--radius); padding:10px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--border); font-size:.73rem; }
.trend-item .val { font-size:1.1rem; font-weight:700; }
.trend-item .lbl { font-size:.65rem; color:var(--text2); margin-top:1px; }

/* Section / Accordion header */
.sec-hdr { display:flex; align-items:center; gap:8px; margin:16px 0 6px; user-select:none; }
.sec-hdr h2 { font-size:1rem; font-weight:700; }

/* Date accordion */
.date-accordion { margin-bottom:6px; }
.date-row { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); margin-bottom:10px; overflow:hidden; }
.date-row-head { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; }
.date-row-head .dlabel { font-weight:650; font-size:.9rem; }
.date-row-head .dmeta { font-size:.73rem; color:var(--text2); }
.date-row-head .darrow { font-size:.8rem; color:var(--text2); transition:transform .25s; }
.date-row.open .date-row-head .darrow { transform:rotate(180deg); }
.date-row-body { display:none; }
.date-row.open .date-row-body { display:block; }

/* Report mini card - 彩色科目卡片 */
.rmc {
  margin: 0 12px 12px 12px;
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  border-left: 4px solid transparent;
}
.rmc:first-child { margin-top: 12px; }
.rmc.subj-706 { border-left-color: var(--c706); background: var(--c706-bg); }
.rmc.subj-807 { border-left-color: var(--c807); background: var(--c807-bg); }
.rmc.subj-en { border-left-color: var(--cen); background: var(--cen-bg); }
.rmc-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px 6px;
}
.rmc-topbar .r-icon { font-size: 1.1rem; }
.rmc-topbar .r-subj-name { font-size: .75rem; font-weight: 700; }
.rmc-topbar .r-subj-name.n706 { color: var(--c706); }
.rmc-topbar .r-subj-name.n807 { color: var(--c807); }
.rmc-topbar .r-subj-name.nen { color: var(--cen); }
.rmc-topbar .r-phase { font-size: .65rem; color: var(--text2); margin-left: auto; }
.rmc-content { padding: 0 12px 10px; }
.rmc-content .si:first-child { border-top: 1px solid var(--border); }

/* Tree mind map */
.tree { padding:4px 0 4px 8px; }
.tree-node { position:relative; }
.tree-node-toggle { display:inline-flex; align-items:center; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; padding:2px 0; }
.tree-node-toggle .tn-arrow { font-size:.65rem; width:16px; flex-shrink:0; transition:transform .2s; color:var(--text2); display:inline-block; text-align:center; }
.tree-node.open > .tree-node-toggle .tn-arrow { transform:rotate(90deg); }
.tree-node-text { font-size:.82rem; line-height:1.5; }
.tree-node-text strong { color:var(--text); }
.tree-children { padding-left:20px; border-left:1.5px solid var(--tree-line); margin-left:7px; display:none; }
.tree-node.open > .tree-children { display:block; }
.tree-leaf { font-size:.8rem; color:var(--text2); padding:2px 0 2px 12px; position:relative; line-height:1.5; }
.tree-leaf::before { content:''; position:absolute; left:0; top:10px; width:5px; height:5px; border-radius:99px; background:var(--tree-line); }
.tree-leaf.has-tag::before { background:var(--c706); }

/* Mind map toggle */
.view-toggle { display:inline-flex; gap:3px; margin-left:4px; }
.view-toggle button { font-size:.6rem; padding:2px 7px; border-radius:99px; border:1px solid var(--border); background:var(--card); cursor:pointer; -webkit-tap-highlight-color:transparent; opacity:.6; }
.view-toggle button.on { opacity:1; font-weight:600; background:var(--hdr); color:var(--hdr-txt); border-color:var(--hdr); }

/* SVG mind map */
.mindmap-svg { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; display:none; padding:6px 0; }
.mindmap-svg.show { display:block; }
.mindmap-svg svg { display:block; }
.mindmap-svg .mm-node rect { rx:8; ry:8; stroke-width:1.5; }
.mindmap-svg .mm-node text { font-size:12px; font-family:var(--font); }
.mindmap-svg .mm-link { stroke-width:1.5; fill:none; }

/* Section item plain (no tree) */
.si { padding:8px 0; border-top:1px solid var(--border); }
.si:first-child { border-top:none; }
.si-head { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
.si-title { font-weight:600; font-size:.85rem; flex:1; }
.si-type { font-size:.65rem; background:var(--border); padding:1px 7px; border-radius:99px; white-space:nowrap; flex-shrink:0; }
.si-body { font-size:.8rem; color:var(--text2); margin-top:4px; line-height:1.6; }
.si-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.si-tags span { font-size:.65rem; padding:2px 7px; border-radius:99px; background:var(--c706-l); color:var(--c706); }
.si-src { font-size:.68rem; color:var(--text2); margin-top:2px; opacity:.6; }

/* TTS */
.tts-btn { width:32px; height:32px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); font-size:.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.tts-btn:active { transform:scale(.92); }
.tts-btn.playing { background:var(--tts); border-color:var(--tts); color:#fff; }

/* Review / Weak / Plan blocks */
.rb { border-top:1px solid var(--border); padding:8px 0; }
.rb-label { font-size:.7rem; font-weight:700; letter-spacing:.04em; margin-bottom:4px; }
.rb-label.recall { color:#5b8c3e; } .rb-label.weak { color:#c7533a; } .rb-label.plan { color:#3a7ec7; }
.rb ul { list-style:none; }
.rb li { font-size:.78rem; padding:3px 0 3px 14px; position:relative; line-height:1.5; }
.rb li::before { content:''; position:absolute; left:0; top:10px; width:4px; height:4px; border-radius:99px; background:var(--text2); }
.rb.recall li::before { background:#5b8c3e; } .rb.weak li::before { background:#c7533a; } .rb.plan li::before { background:#3a7ec7; }

/* Quiz */
.quiz-block { border-top:1px solid var(--border); padding:8px 0; }
.quiz-block .qz { font-size:.78rem; }

/* Read all bar */
.ra-bar { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.ra-btn { font-size:.73rem; padding:7px 12px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); cursor:pointer; display:flex; align-items:center; gap:4px; transition:all .15s; -webkit-tap-highlight-color:transparent; white-space:nowrap; }
.ra-btn:active { transform:scale(.96); }
.ra-btn.playing { background:var(--tts); border-color:var(--tts); color:#fff; }

/* Loading / Empty */
.loading { text-align:center; padding:40px; color:var(--text2); }
.spinner { width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--c706); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:28px 16px; color:var(--text2); }
.empty .eicon { font-size:2rem; margin-bottom:6px; }
.empty p { font-size:.82rem; }

/* Footer */
.footer { text-align:center; padding:20px; font-size:.7rem; color:var(--text2); opacity:.5; }
.footer .dbg { color:var(--text2); text-decoration:underline; cursor:pointer; -webkit-tap-highlight-color:transparent; }

/* Debug modal */
.dbg-overlay { display:none; position:fixed; inset:0; z-index:999; background:var(--bg); overflow-y:auto; padding:16px; }
.dbg-overlay.show { display:block; }
.dbg-close { position:sticky; top:8px; float:right; font-size:1.2rem; width:36px; height:36px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); cursor:pointer; z-index:1; }
.dbg-title { font-size:1rem; font-weight:700; margin-bottom:6px; }
.dbg-note { font-size:.73rem; color:var(--text2); margin-bottom:12px; }
.dbg-table { width:100%; border-collapse:collapse; font-size:.72rem; }
.dbg-table th,.dbg-table td { padding:6px 8px; border-bottom:1px solid var(--border); text-align:left; vertical-align:middle; }
.dbg-table th { font-size:.65rem; color:var(--text2); position:sticky; top:0; background:var(--bg); }
.dbg-table .hi { font-weight:700; color:var(--c706); }
.dbg-play { font-size:.65rem; padding:3px 9px; border-radius:99px; border:1px solid var(--border); background:var(--card); cursor:pointer; }

/* Hide subject views initially */
.subject-view { display:none; }
.subject-view.active { display:block; }
.home-view { display:none; }
.home-view.active { display:block; }

/* ====== REVIEW SCHEDULER ====== */
.review-view { display:none; }
.review-view.active { display:block; }
.dc.rev { background: var(--card); border-left: 4px solid #7c3aed; }
.dc.rev .pct { color: #7c3aed; }
.dc.rev .bar { background: #7c3aed; }
.rev-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.rev-stat { background:var(--card); border-radius:var(--radius); padding:10px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--border); }
.rev-stat .rv { font-size:1.3rem; font-weight:700; }
.rev-stat.due .rv { color:#7c3aed; }
.rev-stat.done .rv { color:#5b8c3e; }
.rev-stat.total .rv { color:var(--text); }
.rev-stat .rl { font-size:.65rem; color:var(--text2); margin-top:2px; }
.rqueue { margin-bottom:14px; }
.rq-item { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:transform .12s; -webkit-tap-highlight-color:transparent; }
.rq-item:active { transform:scale(.98); }
.rq-item .rq-badge { width:10px; height:10px; border-radius:99px; flex-shrink:0; }
.rq-badge.b706 { background:var(--c706); } .rq-badge.b807 { background:var(--c807); } .rq-badge.ben { background:var(--cen); }
.rq-item .rq-info { flex:1; min-width:0; }
.rq-item .rq-title { font-size:.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rq-item .rq-meta { font-size:.68rem; color:var(--text2); }
.rq-item .rq-r { font-size:.8rem; font-weight:700; flex-shrink:0; }
.rq-r.r-low { color:#c7533a; } .rq-r.r-mid { color:#e87040; } .rq-r.r-high { color:#5b8c3e; }
.rq-btns { display:flex; gap:8px; margin-top:12px; }
.rq-btns .ra-btn.start-btn { background:#7c3aed; border-color:#7c3aed; color:#fff; font-weight:600; font-size:.82rem; padding:10px 20px; }
.review-panel { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; margin-bottom:14px; }
.review-progress { text-align:center; padding:8px; font-size:.73rem; color:var(--text2); background:var(--bg); }
.card-face { padding:20px 16px; text-align:center; min-height:180px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
.card-subject-badge { font-size:.7rem; padding:3px 10px; border-radius:99px; margin-bottom:12px; display:inline-block; font-weight:600; }
.card-subject-badge.badge-706 { background:var(--c706-l); color:var(--c706); }
.card-subject-badge.badge-807 { background:var(--c807-l); color:var(--c807); }
.card-subject-badge.badge-en { background:var(--cen-l); color:var(--cen); }
.card-title { font-size:1.05rem; font-weight:700; margin-bottom:8px; line-height:1.4; }
.card-summary { font-size:.82rem; color:var(--text2); line-height:1.5; margin-bottom:16px; }
.card-flip-btn { margin-top:12px; }
.card-flip-btn .ra-btn { font-size:.85rem; padding:10px 24px; background:#7c3aed; border-color:#7c3aed; color:#fff; font-weight:600; }
.card-back-content { font-size:.82rem; color:var(--text); line-height:1.6; text-align:left; width:100%; padding:4px 0; white-space:pre-line; }
.card-blocks { width:100%; text-align:left; max-height:52vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 2px; }
.cb-h { font-size:.83rem; font-weight:700; color:var(--text); margin:14px 0 4px; padding-bottom:3px; border-bottom:1.5px solid var(--border); }
.cb-h:first-child { margin-top:2px; }
.cb-p { font-size:.79rem; line-height:1.55; color:var(--text); padding:3px 0 3px 14px; position:relative; }
.cb-p::before { content:'•'; position:absolute; left:0; color:var(--text2); font-weight:700; }
.cb-e { font-size:.74rem; line-height:1.5; color:var(--text2); background:var(--bg); border-radius:8px; padding:8px 12px; margin:4px 0 8px 8px; border-left:3px solid var(--tree-line); }
.cb-q { font-size:.78rem; line-height:1.5; color:var(--text2); font-style:italic; text-align:center; padding:10px 16px; margin:6px 0; border-left:3px solid #e87040; background:var(--bg); border-radius:0 8px 8px 0; }
.cb-m { font-size:.74rem; line-height:1.45; background:#fef9f0; border:1.5px solid #f0d060; border-radius:10px; padding:9px 12px; margin:8px 0 4px; }
@media (prefers-color-scheme: dark) { .cb-m { background:#2a2410; border-color:#5a4a20; } }
.cb-m::before { content:'🧠 记忆：'; font-size:.7rem; font-weight:700; color:#c77d20; }
.rq-sec { font-size:.72rem; font-weight:700; color:var(--text2); padding:12px 0 4px 2px; margin-top:2px; display:flex; align-items:center; gap:6px; }
.rq-sec:first-child { margin-top:0; padding-top:0; }
.rq-sec .rqs-icon { font-size:.9rem; }
.rq-sec .rqs-count { font-weight:400; font-size:.68rem; opacity:.7; }
#reviewBack { flex-direction:column; align-items:stretch; }
.rating-bar { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; padding:0 16px 16px; }
.rating-btn { padding:10px 4px; border-radius:12px; border:2px solid var(--border); background:var(--card); cursor:pointer; font-size:.8rem; font-weight:600; text-align:center; transition:all .12s; -webkit-tap-highlight-color:transparent; }
.rating-btn:active { transform:scale(.95); }
.rating-btn small { display:block; font-weight:400; font-size:.65rem; opacity:.7; }
.rating-btn.r-again { border-color:#c7533a; color:#c7533a; } .rating-btn.r-again:active { background:#fce8ec; }
.rating-btn.r-hard { border-color:#e87040; color:#e87040; } .rating-btn.r-hard:active { background:#fef0eb; }
.rating-btn.r-good { border-color:#5b8c3e; color:#5b8c3e; } .rating-btn.r-good:active { background:#eef5e8; }
.rating-btn.r-easy { border-color:#3a7ec7; color:#3a7ec7; } .rating-btn.r-easy:active { background:#e8f1fa; }
.rev-done { text-align:center; padding:24px 16px; }
.rev-done .icon { font-size:3rem; margin-bottom:8px; }
.rev-done .msg { font-size:1rem; font-weight:700; margin-bottom:4px; }
.rev-done .sub { font-size:.78rem; color:var(--text2); }
.manage-panel { margin-top:10px; }
.import-export-bar { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.import-export-bar select { font-size:.73rem; padding:6px 10px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); color:var(--text); }
.manage-item { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:10px 14px; margin-bottom:6px; display:flex; align-items:center; gap:8px; font-size:.78rem; }
.manage-item .mi-title { flex:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.manage-item .mi-meta { font-size:.68rem; color:var(--text2); flex-shrink:0; }
.manage-item .mi-del { font-size:.7rem; padding:4px 10px; border-radius:99px; border:1px solid #c7533a; background:transparent; color:#c7533a; cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.gen-card-btn { font-size:.68rem; padding:3px 10px; border-radius:99px; border:1.5px solid #7c3aed; background:transparent; color:#7c3aed; cursor:pointer; margin-left:8px; flex-shrink:0; transition:all .12s; -webkit-tap-highlight-color:transparent; white-space:nowrap; }
.gen-card-btn:active { transform:scale(.95); background:#7c3aed; color:#fff; }
.gen-card-btn.has-card { opacity:.35; border-color:var(--border); color:var(--text2); }
.sync-settings { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:14px; margin-bottom:14px; }
.sync-settings label { font-size:.78rem; font-weight:600; display:block; margin-bottom:4px; }
.sync-settings input { width:100%; padding:8px 12px; border-radius:8px; border:1.5px solid var(--border); font-size:.78rem; background:var(--bg); color:var(--text); margin-bottom:8px; }
.sync-settings .note { font-size:.68rem; color:var(--text2); margin-bottom:8px; }
.sync-status { font-size:.73rem; padding:6px 10px; border-radius:99px; display:inline-block; }
.sync-status.ok { background:#eef5e8; color:#5b8c3e; }
.sync-status.err { background:#fce8ec; color:#c7533a; }
.sync-status.syncing { background:#e8f1fa; color:#3a7ec7; }
</style>
</head>
<body>

<div class="header">
  <h1>📚 考研每日晨报</h1>
  <div class="date" id="headerDate">加载中...</div>
</div>

<div class="container">

  <!-- ===== HOME VIEW ===== -->
  <div class="home-view active" id="homeView">
    <div class="dash" id="dashboard"></div>
    <div class="ra-bar" id="raHome" style="display:none">
      <button class="ra-btn" onclick="readAll('all')" id="raAll">▶️ 朗读全部</button>
    </div>
    <div class="sec-hdr"><h2>📅 全部复习记录</h2></div>
    <div class="date-accordion" id="homeAccordion"></div>
    <div class="loading" id="homeLoading"><div class="spinner"></div><p>加载中...</p></div>
  </div>

  <!-- ===== SUBJECT VIEW ===== -->
  <div class="subject-view" id="subjectView">
    <div class="back-bar">
      <button class="back-btn" onclick="goHome()">← 返回首页</button>
    </div>
    <div class="subj-hdr" id="subjHeader"></div>
    <div class="trend" id="trendStats"></div>
    <div class="ra-bar" id="raSubj" style="display:none">
      <button class="ra-btn" onclick="readAll('current')" id="raCur">▶️ 朗读全部</button>
    </div>
    <div class="sec-hdr"><h2>📅 复习记录</h2></div>
    <div class="date-accordion" id="subjAccordion"></div>
    <div class="loading" id="subjLoading"><div class="spinner"></div><p>加载中...</p></div>
  </div>

  <!-- ===== REVIEW VIEW ===== -->
  <div class="review-view" id="reviewView">
    <div class="back-bar">
      <button class="back-btn" onclick="goHome()">&larr; 返回首页</button>
      <span style="flex:1"></span>
      <button class="back-btn" onclick="toggleReviewManage()" id="btnManage">⚙ 管理卡片</button>
    </div>

    <div class="rev-stats" id="reviewStatsBar"></div>

    <div class="empty" id="reviewNoCards"><div class="eicon">📋</div><p>还没有复习卡片</p><p style="font-size:.75rem;color:var(--text2)">在每日报告中点击「+ 制卡」来创建</p></div>

    <div class="sync-settings" id="syncSetup" style="display:none">
      <label>☁ GitHub 同步设置</label>
      <div class="note">粘贴 GitHub Fine-grained PAT，手机端复习后自动同步回电脑。<br>权限只需选择 <b>review_sync.json</b> 一个文件，权限设为 Read & Write。</div>
      <input type="password" id="syncToken" placeholder="ghp_xxxxxxxxxxxx">
      <div style="display:flex;gap:6px;align-items:center">
        <button class="ra-btn" onclick="saveSyncToken()">💾 保存</button>
        <button class="ra-btn" onclick="testSyncToken()">🔍 测试</button>
        <span class="sync-status" id="syncStatus" style="display:none"></span>
      </div>
    </div>

    <div class="sec-hdr"><h2>📋 今日待复习</h2><span class="queue-count" id="queueCount" style="font-size:.75rem;color:var(--text2)"></span></div>
    <div class="rqueue" id="reviewQueue"></div>

    <div class="rq-btns" id="startBtnBar" style="display:none">
      <button class="ra-btn start-btn" onclick="startReview()">▶ 开始复习</button>
      <button class="ra-btn" onclick="quickReview()">⚡ 快速复习</button>
    </div>

    <!-- Card review panel -->
    <div class="review-panel" id="reviewPanel" style="display:none">
      <div class="review-progress" id="reviewProgress"></div>
      <div class="card-face" id="reviewFront">
        <span class="card-subject-badge" id="reviewBadge"></span>
        <div class="card-title" id="reviewTitle"></div>
        <div class="card-summary" id="reviewSummary"></div>
        <div class="card-flip-btn"><button class="ra-btn" onclick="flipCard()">显示答案 → 评分</button></div>
      </div>
      <div class="card-face" id="reviewBack" style="display:none">
        <div class="card-back-content" id="reviewBackContent"></div>
        <div class="rating-bar">
          <button class="rating-btn r-again" onclick="rateCard(1)">忘记<br><small>Again</small></button>
          <button class="rating-btn r-hard" onclick="rateCard(2)">困难<br><small>Hard</small></button>
          <button class="rating-btn r-good" onclick="rateCard(3)">正常<br><small>Good</small></button>
          <button class="rating-btn r-easy" onclick="rateCard(4)">简单<br><small>Easy</small></button>
        </div>
      </div>
      <div class="rev-done" id="reviewDone" style="display:none">
        <div class="icon">🎉</div>
        <div class="msg">今日复习完成！</div>
        <div class="sub" id="reviewDoneStats"></div>
      </div>
    </div>

    <!-- Card management panel -->
    <div class="manage-panel" id="managePanel" style="display:none">
      <div class="import-export-bar">
        <button class="ra-btn" onclick="exportCards()">☁ 导出</button>
        <button class="ra-btn" onclick="importCards()">📥 导入</button>
        <select id="manageFilter" onchange="renderManage()">
          <option value="all">全部科目</option>
          <option value="706">706 古代文学·汉语</option>
          <option value="807">807 现当代·评论</option>
          <option value="english">英语一</option>
        </select>
        <button class="ra-btn" onclick="syncNow()" style="color:#3a7ec7">🔄 同步</button>
        <button class="ra-btn" onclick="resetAllCards()" style="color:#c7533a">重置</button>
      </div>
      <div class="sec-hdr"><h2>全部卡片</h2></div>
      <div class="manage-list" id="manageList"></div>
    </div>
  </div>

  <div class="footer">每日自动生成 · 清晨朗读回顾 · <span class="dbg" onclick="showVoiceDebug()">语音调试</span></div>
</div>

<!-- Voice debug overlay -->
<div class="dbg-overlay" id="dbgOverlay">
  <button class="dbg-close" onclick="hideVoiceDebug()">✕</button>
  <div class="dbg-title">🔊 可用语音列表</div>
  <div class="dbg-note" id="dbgNote">加载中...</div>
  <table class="dbg-table" id="dbgTable"></table>
</div>

<script>
// ====== STATE ======
let curUtt = null, curBtn = null, curAudio = null;
let allDates = [];
let allReports = {};
let currentView = 'home';
let currentSubject = '';
let audioManifests = {};  // { '2026-06-22': { '706': {file, ...}, ... } }
const SUBJECTS = [
  { id:'706', name:'706 古代文学·汉语', icon:'📜', css:'c706', fullName:'中国古代文学与古代汉语', },
  { id:'807', name:'807 现当代·评论', icon:'📖', css:'c807', fullName:'中国现当代文学与评论写作', },
  { id:'english', name:'英语一', icon:'🔤', css:'cen', fullName:'考研英语一', },
];

// ====== INIT ======
document.addEventListener('DOMContentLoaded', init);
async function init() {
  const today = new Date();
  document.getElementById('headerDate').textContent =
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 · 星期${'日一二三四五六'[today.getDay()]}`;

  // Load index
  try {
    const r = await fetch('./daily-reports/index.json');
    if (r.ok) { const idx = await r.json(); allDates = (idx.available_dates||[]).sort((a,b)=>b.date.localeCompare(a.date)); }
  } catch(_){}

  // Load ALL reports for all dates
  await loadAllReports();
  // Load audio manifests (tiny files)
  await loadAllAudio();
  renderHome();
}

async function loadAllReports() {
  for (const d of allDates) {
    if (allReports[d.date]) continue;
    const dayData = {};
    for (const s of SUBJECTS) {
      try {
        const r = await fetch(`./daily-reports/${d.date}/${s.id}_report.json`);
        if (r.ok) dayData[s.id] = await r.json();
      } catch(_) {}
    }
    allReports[d.date] = dayData;
  }
}

async function loadAllAudio() {
  for (const d of allDates) {
    if (audioManifests[d.date]) continue;
    try {
      const r = await fetch(`./daily-reports/${d.date}/audio/manifest.json`);
      if (r.ok) audioManifests[d.date] = await r.json();
    } catch(_) {}
  }
}

// ====== RENDER HOME ======
function renderHome() {
  document.getElementById('homeView').classList.add('active');
  document.getElementById('subjectView').classList.remove('active');
  document.getElementById('homeLoading').style.display = 'none';
  currentView = 'home'; currentSubject = '';

  // Dashboard
  const dash = document.getElementById('dashboard');
  let dh = '';
  for (const s of SUBJECTS) {
    const stats = calcStats(s.id);
    dh += `<div class="dc ${s.css}" onclick="goSubject('${s.id}')">
      <div class="icon">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="pct">${stats.days}天</div>
      <div class="info">${stats.sections}个知识点</div>
    </div>`;
  }
  dash.innerHTML = dh;

  // Date accordion
  buildAccordion('homeAccordion', null);
}

// ====== CALC STATS ======
function calcStats(subjId) {
  let days = 0, sections = 0;
  for (const ds in allReports) {
    const d = allReports[ds][subjId];
    if (!d) continue;
    days++;
    if (d.topics) sections += d.topics.length;
  }
  return { days, sections };
}

// ====== GO SUBJECT ======
function goSubject(subjId) {
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('subjectView').classList.add('active');
  document.getElementById('subjLoading').style.display = 'none';
  currentView = 'subject'; currentSubject = subjId;

  const s = SUBJECTS.find(x => x.id === subjId);
  const stats = calcStats(subjId);

  // Header
  document.getElementById('subjHeader').innerHTML = `
    <div class="dot" style="background:var(--${s.id==='english'?'cen':s.id==='807'?'c807':'c706'})"></div>
    <div>
      <div class="sh-title">${s.icon} ${s.fullName}</div>
      <div class="sh-info">累计学习 ${stats.days} 天 · ${stats.sections} 个知识点</div>
    </div>`;

  // Trends
  document.getElementById('trendStats').innerHTML = `
    <div class="trend-item"><div class="val">${stats.days}</div><div class="lbl">学习天数</div></div>
    <div class="trend-item"><div class="val">${stats.sections}</div><div class="lbl">知识点数</div></div>
    <div class="trend-item"><div class="val">-</div><div class="lbl">今日晨报</div></div>`;

  // Accordion
  buildAccordion('subjAccordion', subjId);

  window.scrollTo({ top:0, behavior:'smooth' });
}

function goHome() {
  renderHome();
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ====== BUILD DATE ACCORDION ======
function buildAccordion(containerId, filterSubject) {
  const c = document.getElementById(containerId);
  if (allDates.length === 0) {
    c.innerHTML = '<div class="empty"><div class="eicon">📭</div><p>暂无复习记录</p></div>';
    return;
  }

  let html = '';
  for (const di of allDates) {
    const dd = allReports[di.date];
    if (!dd) continue;

    let hasContent = false;
    if (filterSubject) {
      hasContent = !!dd[filterSubject];
    } else {
      hasContent = !!(dd['706'] || dd['807'] || dd['english']);
    }
    if (!hasContent) continue;

    // Date label
    const parts = di.date.split('-');
    const dlabel = `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
    const dow = new Date(di.date).getDay();
    const week = '周' + '日一二三四五六'[dow];

    html += `<div class="date-row"><div class="date-row-head" onclick="toggleDateRow(this.parentElement)">`;
    html += `<span class="dlabel">📅 ${dlabel} <span style="font-weight:400;font-size:.75rem;color:var(--text2)">${week}</span></span>`;
    html += `<span class="darrow">▾</span></div><div class="date-row-body">`;

    if (filterSubject) {
      // Show only this subject
      if (dd[filterSubject]) {
        html += renderSubjectReport(filterSubject, dd[filterSubject], di.date);
      }
    } else {
      // Show all three
      for (const s of SUBJECTS) {
        if (dd[s.id]) html += renderSubjectReport(s.id, dd[s.id], di.date);
      }
    }

    html += `</div></div>`;
  }
  c.innerHTML = html;
}

function switchView(sid, mode) {
  const tree = document.getElementById(sid+'_tree');
  const map = document.getElementById(sid+'_map');
  const btns = document.querySelectorAll(`[onclick*="${sid}"]`);
  btns.forEach(b => b.classList.toggle('on', b.textContent.includes(mode==='tree'?'层级':'导图')));
  if (mode === 'tree') { if(tree) tree.style.display='block'; if(map) map.classList.remove('show'); }
  else { if(tree) tree.style.display='none'; if(map) map.classList.add('show'); }
}

// ====== MIND MAP TREE ======
function renderTree(points, depth) {
  depth = depth || 0;
  let h = '';
  for (const p of points) {
    const hasKids = p.children && p.children.length > 0;
    h += `<div class="tree-node${hasKids?' open':''}">`;
    h += `<div class="tree-node-toggle" onclick="toggleTreeNode(event, this.parentElement)">`;
    if (hasKids) h += `<span class="tn-arrow">▶</span>`;
    else h += `<span class="tn-arrow" style="visibility:hidden">▶</span>`;
    h += `<span class="tree-node-text">${hasKids ? '<strong>'+escHtml(p.text)+'</strong>' : escHtml(p.text)}</span>`;
    h += `</div>`;
    if (hasKids) {
      h += `<div class="tree-children">${renderTree(p.children, depth+1)}</div>`;
    }
    h += `</div>`;
  }
  return h;
}

function toggleTreeNode(event, node) {
  event.stopPropagation();
  node.classList.toggle('open');
}

// ====== MIND MAP SVG ======
function renderMindMap(subjId, heading, points) {
	if (!points || points.length === 0) return '';
	var colors = {
		'706': { main: '#c77d20', light: '#fdf0e0', light2: '#fef5e8' },
		'807': { main: '#2e7d8c', light: '#dff2f5', light2: '#edf7f9' },
		'english': { main: '#b8485e', light: '#fce8ec', light2: '#fef2f4' }
	};
	var c = colors[subjId] || colors['706'];
	var W = 340, MARGIN = 10, NODE_H = 28, PAD = 12;
	var ROOT_Y = 14, L1_Y = 64, VGAP = 8;
	var usableW = W - MARGIN * 2;

	function tw(text) {
		var w = 0;
		for (var i = 0; i < text.length; i++) w += text.charCodeAt(i) > 127 ? 13 : 7;
		return Math.min(w + PAD * 2, usableW - 4);
	}
	function trunc(text, max) {
		return text.length > max ? text.substring(0, max) + '…' : text;
	}

	var nodes = [];
	var rootCX = W / 2;
	var rootW = Math.min(tw(heading), 160);
	nodes.push({ x: rootCX - rootW/2, y: ROOT_Y, w: rootW, text: trunc(heading, 14), fill: c.main, stroke: c.main, tc: '#fff', bold: true, fs: 12 });
	var maxY = ROOT_Y + NODE_H;
	var n = points.length;

	for (var i = 0; i < n; i++) {
		var p = points[i];
		var slotW = usableW / n;
		var cx = MARGIN + slotW * (i + 0.5);
		var w = Math.min(tw(p.text), slotW - 6);
		var ny = L1_Y;
		nodes.push({ x: cx - w/2, y: ny, w: w, text: trunc(p.text, 16), fill: c.light, stroke: c.main, tc: c.main, bold: true, fs: 11, px: rootCX, py: ROOT_Y + NODE_H });
		maxY = Math.max(maxY, ny + NODE_H);
		if (!p.children || !p.children.length) continue;
		var childY = ny + NODE_H + VGAP;
		for (var j = 0; j < p.children.length; j++) {
			var child = p.children[j];
			var cw = Math.min(tw(child.text), slotW - 6);
			nodes.push({ x: cx - cw/2, y: childY, w: cw, text: trunc(child.text, 18), fill: '#fff', stroke: '#ddd8ce', tc: '#5c5240', bold: false, fs: 10, px: cx, py: childY - VGAP/2 });
			childY += NODE_H + VGAP;
			maxY = Math.max(maxY, childY - VGAP);
			if (!child.children || !child.children.length) continue;
			for (var k = 0; k < child.children.length; k++) {
				var gc = child.children[k];
				var gcw = Math.min(tw(gc.text), slotW - 10);
				nodes.push({ x: cx - gcw/2, y: childY, w: gcw, text: trunc(gc.text, 22), fill: c.light2, stroke: '#e8e2d6', tc: '#9a8e78', bold: false, fs: 10, px: cx, py: childY - VGAP/2 });
				childY += NODE_H + VGAP;
				maxY = Math.max(maxY, childY - VGAP);
			}
		}
	}

	var H = maxY + 20;
	var svg = '<svg width="100%" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
	// Lines
	for (var li = 0; li < nodes.length; li++) {
		var nd = nodes[li];
		if (nd.px === undefined) continue;
		var ex = nd.x + nd.w / 2, ey = nd.y, midY = (nd.py + ey) / 2;
		svg += '<path d="M' + nd.px + ',' + nd.py + ' C' + nd.px + ',' + midY + ' ' + ex + ',' + midY + ' ' + ex + ',' + ey + '" stroke="' + c.main + '" stroke-width="1" fill="none" opacity="0.3"/>';
	}
	// Non-root nodes
	for (var ni = 1; ni < nodes.length; ni++) {
		var nd2 = nodes[ni];
		svg += '<rect x="' + nd2.x + '" y="' + nd2.y + '" width="' + nd2.w + '" height="' + NODE_H + '" rx="9" fill="' + nd2.fill + '" stroke="' + nd2.stroke + '" stroke-width="1"/>';
		svg += '<text x="' + (nd2.x + nd2.w/2) + '" y="' + (nd2.y + NODE_H/2 + 4) + '" text-anchor="middle" fill="' + nd2.tc + '" font-size="' + nd2.fs + '" font-weight="' + (nd2.bold ? 'bold' : 'normal') + '">' + escXml(nd2.text) + '</text>';
	}
	// Root node (on top)
	var r = nodes[0];
	svg += '<rect x="' + (r.x - 1) + '" y="' + (r.y + 1) + '" width="' + r.w + '" height="' + NODE_H + '" rx="14" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2"/>';
	svg += '<rect x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + NODE_H + '" rx="14" fill="' + r.fill + '" stroke="' + r.stroke + '" stroke-width="1.5"/>';
	svg += '<text x="' + (r.x + r.w/2) + '" y="' + (r.y + NODE_H/2 + 5) + '" text-anchor="middle" fill="' + r.tc + '" font-size="' + r.fs + '" font-weight="bold">' + escXml(r.text) + '</text>';
	svg += '</svg>';
	return svg;
}

// ====== DATE ROW TOGGLE ======
function toggleDateRow(row) {
  row.classList.toggle('open');
}

// ====== TTS / AUDIO ======
function toggleSubjAudio(event, subjectId, dateStr) {
  event.stopPropagation();
  const btn = event.currentTarget;

  // 点同一个按钮 → 暂停
  if (curBtn === btn && (curAudio || (curUtt && window.speechSynthesis.speaking))) {
    stopAll();
    return;
  }

  stopAll();

  const manifest = audioManifests[dateStr];

  // 优先播 mp3（Edge TTS 整科音频）
  if (manifest && manifest[subjectId]) {
    const url = './daily-reports/' + dateStr + '/audio/' + manifest[subjectId].file;
    playAudio(url, btn);
    return;
  }

  // 回退：Web Speech API — 朗读整科全部 topics
  const dd = allReports[dateStr];
  if (!dd) return;
  const data = dd[subjectId];
  if (!data) return;
  const topics = data.topics || [];

  let text = '';
  for (const t of topics) {
    text += t.title + '。。。。。';
    if (t.points && t.points.length) {
      text += flattenPoints(t.points);
    } else if (t.summary) {
      text += stripTags(t.summary);
    }
    text += '。。。。。';
  }
  if (data.key_takeaways && data.key_takeaways.length) {
    text += '回顾要点。' + data.key_takeaways.join('。。');
  }
  speak(text, subjectId, btn);
}

function playAudio(url, btn) {
  var a = new Audio(url);
  a.onplay = function() { btn.classList.add('playing'); btn.textContent = '⏸️'; curAudio = a; curBtn = btn; };
  a.onended = function() { resetBtn(btn); curAudio = null; curBtn = null; };
  a.onerror = function() { resetBtn(btn); curAudio = null; curBtn = null; /* 静默失败 */ };
  a.play().catch(function() { resetBtn(btn); });
}

function stopAll() {
  if (curAudio) { curAudio.pause(); curAudio.currentTime = 0; curAudio = null; }
  stopTts();
}

function flattenPoints(points) {
  let t = '';
  for (const p of points) {
    t += p.text + '。';
    if (p.children && p.children.length) t += flattenPoints(p.children);
  }
  return t;
}

let _voiceCache = null;
function getVoicesList() {
  if (_voiceCache && _voiceCache.length > 0) return _voiceCache;
  var v = speechSynthesis.getVoices();
  if (v && v.length > 0) _voiceCache = v;
  return v || [];
}
speechSynthesis.onvoiceschanged = function() {
  _voiceCache = speechSynthesis.getVoices();
};

function pickVoice(lang) {
  var voices = getVoicesList();
  if (!voices || voices.length === 0) return null;

  var lc = function(s) { return (s||'').toLowerCase(); };

  // 1) name 或 voiceURI 含 "siri"（覆盖中英文 iOS）
  var v = null;
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang !== lang) continue;
    var n = lc(voices[i].name);
    var u = lc(voices[i].voiceURI);
    if (n.indexOf('siri') !== -1 || u.indexOf('siri') !== -1) {
      v = voices[i];
      break;
    }
  }
  if (v) return v;

  // 2) iOS 语音 URI 常见模式：compact 或 enhanced 通常是 Siri 类高品质语音
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang !== lang) continue;
    var u = lc(voices[i].voiceURI);
    if (u.indexOf('compact') !== -1 || u.indexOf('enhanced') !== -1 || u.indexOf('premium') !== -1) {
      v = voices[i];
      break;
    }
  }
  if (v) return v;

  // 3) 标记为 default 的语音
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === lang && voices[i].default) {
      v = voices[i];
      break;
    }
  }
  if (v) return v;

  // 4) 任意匹配 lang
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === lang) { v = voices[i]; break; }
  }
  if (v) return v;

  // 5) 语言前缀匹配
  var prefix = lang.split('-')[0];
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf(prefix) === 0) { v = voices[i]; break; }
  }
  return v;
}

function speak(text, subjectId, btn) {
  var u = new SpeechSynthesisUtterance(text);
  var lang = subjectId === 'english' ? 'en-US' : 'zh-CN';
  u.lang = lang;
  u.rate = 0.88;
  // 始终尝试选语音（不依赖 voicesReady，避免事件未触发导致永远用默认语音）
  var voice = pickVoice(lang);
  if (voice) u.voice = voice;
  u.onstart = () => { btn.classList.add('playing'); btn.textContent='⏸️'; curBtn=btn; curUtt=u; };
  u.onend = () => resetBtn(btn);
  u.onerror = () => resetBtn(btn);
  window.speechSynthesis.speak(u);
}

function stopTts() { window.speechSynthesis.cancel(); if (curBtn) resetBtn(curBtn); curUtt=null; curBtn=null; }
function resetBtn(btn) { btn.classList.remove('playing'); btn.textContent='▶️ 朗读复习'; }

// ====== READ ALL ======
function readAll(scope) {
  stopAll();
  let all = [];
  const dates = Object.keys(allReports).sort((a,b)=>b.localeCompare(a));

  for (const ds of dates) {
    for (const s of SUBJECTS) {
      if (scope !== 'all' && scope !== 'current') continue;
      if (currentView === 'subject' && s.id !== currentSubject) continue;
      const dd = allReports[ds][s.id];
      if (!dd || !dd.topics) continue;
      for (const t of dd.topics) {
        let txt = t.title + '。';
        if (sec.points) txt += flattenPoints(sec.points);
        else txt += stripTags(t.summary||'');
        all.push({ text:txt, subjId:s.id, date:ds, heading:t.title });
      }
    }
  }

  if (all.length === 0) return;

  let fullText = all.map((a,i) => {
    const d = a.date.split('-');
    return `第${i+1}段，${parseInt(d[1])}月${parseInt(d[2])}日，${a.heading}。${a.text}`;
  }).join('\n\n');

  const lang = all[0].subjId === 'english' ? 'en-US' : 'zh-CN';
  const btnId = scope === 'all' ? 'raAll' : 'raCur';
  const btn = document.getElementById(btnId);
  speak(fullText, lang === 'en-US' ? 'english' : '706', btn);
}

// ====== HELPERS ======
function escHtml(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escXml(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }
function stripTags(s) { if(!s)return''; return s.replace(/<[^>]*>/g,'').replace(/\*\*/g,'').replace(/\[\[/g,'').replace(/\]\]/g,''); }
function simpleMd(s) {
  if(!s)return'';
  return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\[\[([^\]]+)\]\]/g,'$1').replace(/\n/g,'<br>');
}

var HISTORY_KEY = 'kaoyan_review_history';
var SETTINGS_KEY = 'kaoyan_review_settings';
var SYNC_TOKEN_KEY = 'kaoyan_github_token';

function loadReviewStore() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    reviewCards = raw ? JSON.parse(raw) : {};
    raw = localStorage.getItem(HISTORY_KEY);
    reviewHistory = raw ? JSON.parse(raw) : [];
    raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) reviewSettings = JSON.parse(raw);
  } catch(e) { reviewCards = {}; reviewHistory = []; }
}
function saveReviewStore() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(reviewCards)); } catch(e) {}
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(reviewHistory)); } catch(e) {}
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(reviewSettings)); } catch(e) {}
  if (isLocalMode()) autoSaveToLocal();
}

// Check if running on localhost
function isLocalMode() {
  return location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}

// Auto-save to review_sync.json via local server
var _autoSaveTimer = null;
function autoSaveToLocal() {
  if (!isLocalMode()) return;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function() {
    fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cards: reviewCards, history: reviewHistory, settings: reviewSettings }) }).catch(function() {});
  }, 500);
}

// Load review_sync.json from server
async function loadSyncFromServer() {
  if (!isLocalMode()) {
    // Try from GitHub Pages (deployed JSON)
    try {
      var r = await fetch('./review_sync.json?t=' + Date.now());
      if (r.ok) {
        var data = await r.json();
        if (data.cards) {
          var merged = {};
          // GitHub data as base
          for (var id in data.cards) merged[id] = data.cards[id];
          // Local overrides (keep newer reviews)
          for (var id in reviewCards) {
            var local = reviewCards[id];
            var remote = merged[id];
            if (!remote || (local.reps || 0) > (remote.reps || 0)) merged[id] = local;
          }
          reviewCards = merged;
          mergeHistory(data.history || []);
          if (data.settings && typeof data.settings.target_retention === 'number') reviewSettings = data.settings;
          saveReviewStore();
        }
      }
    } catch(_) {}
    return;
  }
  try {
    var r = await fetch('/review_sync.json?t=' + Date.now());
    if (r.ok) {
      var data = await r.json();
      if (data.cards) {
        var merged = {};
        for (var id in data.cards) merged[id] = data.cards[id];
        for (var id in reviewCards) {
          var local = reviewCards[id];
          var remote = merged[id];
          if (!remote || (local.reps || 0) > (remote.reps || 0)) merged[id] = local;
        }
        reviewCards = merged;
        mergeHistory(data.history || []);
        if (data.settings && typeof data.settings.target_retention === 'number') reviewSettings = data.settings;
        saveReviewStore();
      }
    }
  } catch(_) {}
}

function mergeHistory(remoteHistory) {
  var existing = {};
  for (var i = 0; i < reviewHistory.length; i++) {
    var h = reviewHistory[i];
    existing[h.card_id + '_' + h.timestamp] = true;
  }
  for (var i = 0; i < remoteHistory.length; i++) {
    var h = remoteHistory[i];
    var key = h.card_id + '_' + h.timestamp;
    if (!existing[key]) {
      reviewHistory.push(h);
      existing[key] = true;
    }
  }
}

var GITHUB_API = 'https://api.github.com/repos/YLhyc/-1/contents/daily/review_sync.json';

    .catch(function() { setSyncStatus('err', '网络错误'); });

async function syncToGitHub() {
  var tok = getSyncToken();
  if (!tok) return;
  try {
    var content = JSON.stringify({ cards: reviewCards, history: reviewHistory, settings: reviewSettings }, null, 2);
    // Get current SHA
    var r = await fetch(GITHUB_API, { headers: { 'Authorization': 'Bearer ' + tok, 'Accept': 'application/vnd.github.v3+json' } });
    var sha = null;
    if (r.ok) {
      var info = await r.json();
      sha = info.sha;
    }
    // PUT
    var body = JSON.stringify({ message: '同步复习卡片', content: btoa(unescape(encodeURIComponent(content))), sha: sha, branch: 'main' });
    r = await fetch(GITHUB_API, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + tok, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: body });
    if (r.ok) setSyncStatus('ok', '同步成功 ' + new Date().toLocaleTimeString());
    else setSyncStatus('err', '同步失败 HTTP ' + r.status);
  } catch(e) { setSyncStatus('err', '同步错误'); }
}

function cardIdFromTopic(subjId, dateStr, topicIdx) {
  return 'card_' + subjId + '_' + dateStr.replace(/-/g, '') + '_t' + topicIdx;
}

function cardExists(cardId) { return !!reviewCards[cardId]; }

function genCardFromTopic(subjId, dateStr, topicIdx) {
  var dd = allReports[dateStr];
  if (!dd) return;
  var data = dd[subjId];
  if (!data || !data.topics) return;
  var t = data.topics[topicIdx];
  if (!t) return;

  var cardId = cardIdFromTopic(subjId, dateStr, topicIdx);
  if (cardExists(cardId)) return;

  // Build blocks from tree-structured points
  var blocks = [];
  if (t.points && t.points.length) {
    blocks = blocksFromPoints(t.points);
  } else if (t.summary) {
    blocks = [{"t":"p","c": t.summary}];
  }

  var card = {
    id: cardId, subject: subjId, date: dateStr, title: t.title, summary: t.summary || '',
    blocks: blocks, points_text: flattenBlocks(blocks),
    difficulty: null, stability: null, fsrs_state: 'Learning',
    last_reviewed: null, next_review: null, reps: 0, lapses: 0,
    created_at: Date.now(), source: 'daily_report'
  };
  reviewCards[card.id] = card;
  saveReviewStore();
  renderReviewView();
}

function blocksFromPoints(points) {
  var blocks = [];
  function walk(pts) {
    for (var i = 0; i < pts.length; i++) {
      var hasKids = pts[i].children && pts[i].children.length > 0;
      blocks.push({t: hasKids ? 'h' : 'p', c: pts[i].text});
      if (hasKids) {
        for (var j = 0; j < pts[i].children.length; j++) {
          blocks.push({t: 'e', c: pts[i].children[j].text});
        }
      }
    }
  }
  walk(points);
  return blocks;
}

function flattenBlocks(blocks) {
  if (!blocks || !blocks.length) return '';
  return blocks.map(function(b) { return b.c; }).join('\n');
}

function flattenPointsForCard(points) {
  var lines = [];
  function walk(pts, indent) {
    for (var i = 0; i < pts.length; i++) {
      lines.push((indent ? '  '.repeat(indent) + '· ' : '') + pts[i].text);
      if (pts[i].children && pts[i].children.length) walk(pts[i].children, indent + 1);
    }
  }
  walk(points, 0);
  return lines.join('\n');
}

// Review session
function startReview(mode) {
  mode = mode || 'full';
  var now = Date.now();
  var dueIds = [];
  for (var id in reviewCards) {
    if (fsrsIsDue(reviewCards[id], now)) dueIds.push(id);
  }
  dueIds.sort(function(a, b) {
    return fsrsCurrentR(reviewCards[a], now) - fsrsCurrentR(reviewCards[b], now);
  });
  if (dueIds.length > reviewSettings.max_reviews_per_day) {
    dueIds = dueIds.slice(0, reviewSettings.max_reviews_per_day);
  }
  if (dueIds.length === 0) {
    document.getElementById('reviewPanel').style.display = 'block';
    document.getElementById('reviewFront').style.display = 'none';
    document.getElementById('reviewBack').style.display = 'none';
    document.getElementById('reviewProgress').style.display = 'none';
    document.getElementById('reviewDone').style.display = 'block';
    document.getElementById('reviewDoneStats').textContent = '没有待复习的卡片，干得好！';
    return;
  }
  reviewSession = { active: true, queue: dueIds, index: 0, currentCard: null, mode: mode };
  document.getElementById('reviewPanel').style.display = 'block';
  document.getElementById('reviewDone').style.display = 'none';
  document.getElementById('reviewProgress').style.display = 'block';
  showReviewProgress();
  showNextCard();
}

function quickReview() { startReview('quick'); }

function showReviewProgress() {
  document.getElementById('reviewProgress').textContent = (reviewSession.index + 1) + ' / ' + reviewSession.queue.length;
}

function showNextCard() {
  if (reviewSession.index >= reviewSession.queue.length) {
    endReview();
    return;
  }
  var cid = reviewSession.queue[reviewSession.index];
  var card = reviewCards[cid];
  reviewSession.currentCard = card;

  document.getElementById('reviewFront').style.display = 'flex';
  document.getElementById('reviewBack').style.display = 'none';
  document.getElementById('reviewDone').style.display = 'none';
  document.getElementById('reviewProgress').style.display = 'block';
  showReviewProgress();

  document.getElementById('reviewTitle').textContent = card.title;
  document.getElementById('reviewSummary').textContent = card.summary || '';

  var s = SUBJECTS.find(function(x) { return x.id === card.subject; });
  var badge = document.getElementById('reviewBadge');
  badge.textContent = (s ? s.icon : '') + ' ' + (card.subject === 'english' ? '英语一' : s ? s.name : card.subject);
  badge.className = 'card-subject-badge badge-' + (card.subject === 'english' ? 'en' : card.subject === '807' ? '807' : '706');

  if (reviewSession.mode === 'quick') {
    document.getElementById('reviewBackContent').innerHTML = '<div class="card-blocks">' + renderCardBlocks(card) + '</div>';
    document.getElementById('reviewFront').style.display = 'none';
    document.getElementById('reviewBack').style.display = 'flex';
  }
}

function renderCardBlocks(card) {
  var blocks = card.blocks;
  // Fallback for legacy cards without blocks
  if (!blocks || !blocks.length) {
    return '<div class="cb-p">' + escHtml(card.points_text || '') + '</div>';
  }
  var h = '';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    if (b.t === 'h') h += '<div class="cb-h">' + escHtml(b.c) + '</div>';
    else if (b.t === 'p') h += '<div class="cb-p">' + escHtml(b.c) + '</div>';
    else if (b.t === 'e') h += '<div class="cb-e">' + escHtml(b.c) + '</div>';
    else if (b.t === 'q') h += '<div class="cb-q">' + escHtml(b.c) + '</div>';
    else if (b.t === 'm') h += '<div class="cb-m">' + escHtml(b.c) + '</div>';
    else h += '<div class="cb-p">' + escHtml(b.c) + '</div>';
  }
  return h;
}

function flipCard() {
  document.getElementById('reviewFront').style.display = 'none';
  document.getElementById('reviewBack').style.display = 'flex';
  document.getElementById('reviewBackContent').innerHTML = '<div class="card-blocks">' + renderCardBlocks(reviewSession.currentCard) + '</div>';
}

function rateCard(rating) {
  var card = reviewSession.currentCard;
  var now = Date.now();
  var result;
  if (!card.last_reviewed) {
    result = fsrsInit(rating);
    result.last_reviewed = now;
    result.next_review = now + result.stability * 24 * 3600 * 1000;
    result.reps = 1;
    result.lapses = rating === 1 ? 1 : 0;
  } else {
    result = fsrsSchedule(card, rating, now);
  }
  card.difficulty = result.difficulty;
  card.stability = result.stability;
  card.fsrs_state = result.state;
  card.last_reviewed = result.last_reviewed;
  card.next_review = result.next_review;
  card.reps = result.reps;
  card.lapses = result.lapses;

  reviewHistory.push({
    card_id: card.id, rating: rating, timestamp: now,
    retrievability_before: result.retrievability_before
  });
  saveReviewStore();
  reviewSession.index++;
  setTimeout(showNextCard, 250);
}

function endReview() {
  var done = reviewSession.index;
  reviewSession = { active: false, queue: [], index: 0, currentCard: null, mode: 'full' };
  document.getElementById('reviewFront').style.display = 'none';
  document.getElementById('reviewBack').style.display = 'none';
  document.getElementById('reviewProgress').style.display = 'none';
  document.getElementById('reviewDone').style.display = 'block';
  document.getElementById('reviewDoneStats').textContent = '完成 ' + done + ' 张卡片';

  // Auto-sync after review
  if (!isLocalMode() && getSyncToken()) syncToGitHub();

  setTimeout(function() {
    document.getElementById('reviewPanel').style.display = 'none';
    renderReviewView();
  }, 1500);
}

function renderReviewView() {
  var now = Date.now();
  var dueIds = [];
  for (var id in reviewCards) {
    if (fsrsIsDue(reviewCards[id], now)) dueIds.push(id);
  }
  dueIds.sort(function(a, b) {
    return fsrsCurrentR(reviewCards[a], now) - fsrsCurrentR(reviewCards[b], now);
  });

  // Stats — per-subject counts
  var doneToday = reviewHistory.filter(function(h) {
    return new Date(h.timestamp).toDateString() === new Date().toDateString();
  }).length;
  var due706 = 0, due807 = 0, dueEn = 0, total706 = 0, total807 = 0, totalEn = 0;
  for (var id in reviewCards) {
    var s = reviewCards[id].subject;
    if (s === '706') { total706++; if (fsrsIsDue(reviewCards[id], now)) due706++; }
    else if (s === '807') { total807++; if (fsrsIsDue(reviewCards[id], now)) due807++; }
    else { totalEn++; if (fsrsIsDue(reviewCards[id], now)) dueEn++; }
  }

  document.getElementById('reviewStatsBar').innerHTML =
    '<div class="rev-stat due"><div class="rv">' + dueIds.length + '</div><div class="rl">待复习</div></div>' +
    '<div class="rev-stat done"><div class="rv">' + doneToday + '</div><div class="rl">今日已完成</div></div>' +
    '<div class="rev-stat total"><div class="rv">' + Object.keys(reviewCards).length + '</div><div class="rl">总卡片</div></div>' +
    '<div class="rev-stat" style="font-size:.62rem;padding:2px 0"><div style="color:var(--c706)">📜' + due706 + '</div><div style="color:var(--c807)">📖' + due807 + '</div><div style="color:var(--cen)">🔤' + dueEn + '</div></div>';

  // No cards state
  var noCards = Object.keys(reviewCards).length === 0;
  document.getElementById('reviewNoCards').style.display = noCards ? 'block' : 'none';
  document.getElementById('reviewQueue').style.display = noCards ? 'none' : 'block';
  document.getElementById('startBtnBar').style.display = dueIds.length > 0 ? 'flex' : 'none';
  document.getElementById('queueCount').textContent = '(' + dueIds.length + ')';

  if (noCards) return;

  // Queue — grouped by subject
  function renderQueueGroup(dueList, subject, label, icon) {
    var groupCards = dueList.filter(function(cid) { return reviewCards[cid].subject === subject; });
    if (groupCards.length === 0) return '';
    var html = '<div class="rq-sec"><span class="rqs-icon">' + icon + '</span>' + label +
      '<span class="rqs-count">' + groupCards.length + '张</span></div>';
    for (var i = 0; i < Math.min(groupCards.length, 10); i++) {
      var card = reviewCards[groupCards[i]];
      var r = fsrsCurrentR(card, now);
      var rpct = Math.round(r * 100);
      var rcls = rpct < 60 ? 'r-low' : rpct < 80 ? 'r-mid' : 'r-high';
      var badgeCls = card.subject === 'english' ? 'ben' : card.subject === '807' ? 'b807' : 'b706';
      var meta = (card.reps || 0) + '次复习 · ' + fsrsIntervalText(card, now);
      html += '<div class="rq-item"><div class="rq-badge ' + badgeCls + '"></div>';
      html += '<div class="rq-info"><div class="rq-title">' + escHtml(card.title) + '</div><div class="rq-meta">' + meta + '</div></div>';
      html += '<div class="rq-r ' + rcls + '">' + rpct + '%</div></div>';
    }
    if (groupCards.length > 10) {
      html += '<div style="font-size:.68rem;color:var(--text2);padding:2px 0 8px 18px">还有 ' + (groupCards.length - 10) + ' 张...</div>';
    }
    return html;
  }

  var qhtml = renderQueueGroup(dueIds, '706', '古代文学·汉语', '📜');
  qhtml += renderQueueGroup(dueIds, '807', '现当代·评论', '📖');
  qhtml += renderQueueGroup(dueIds, 'english', '英语一', '🔤');
  document.getElementById('reviewQueue').innerHTML = qhtml;

  // If manage panel open, refresh it
  var mp = document.getElementById('managePanel');
  if (mp.style.display !== 'none') renderManage();
}

  h += '<button class="ra-btn" onclick="toggleSubjAudio(event,\'' + subjId + '\',\'' + dateStr + '\')" id="btn_' + subjId + '_' + dateStr.replace(/-/g, '') + '">▶️ 朗读复习</button>';
  h += '</div>';

  for (var i = 0; i < topics.length; i++) {
    var t = topics[i];
    var hasPoints = t.points && t.points.length > 0;
    var tid = 't_' + subjId + '_' + dateStr.replace(/-/g, '') + '_' + i;
    var cid = cardIdFromTopic(subjId, dateStr, i);
    var hasCard = cardExists(cid);

    h += '<div class="si"><div class="si-head">';
    h += '<span class="si-title">' + escHtml(t.title) + '</span>';
    h += '<button class="gen-card-btn' + (hasCard ? ' has-card' : '') + '" onclick="event.stopPropagation();' + (hasCard ? '' : 'genCardFromTopic(\'' + subjId + '\',\'' + dateStr + '\',' + i + ')') + '">' + (hasCard ? '✓ 已制卡' : '+ 制卡') + '</button>';
    h += '</div>';

    if (hasPoints) {
      h += '<div class="view-toggle">';
      h += '<button class="on" onclick="switchView(\'' + tid + '\',\'tree\')">📋 层级</button>';
      h += '<button onclick="switchView(\'' + tid + '\',\'map\')">🗺️ 导图</button>';
      h += '</div>';
      h += '<div class="tree" id="' + tid + '_tree">' + renderTree(t.points) + '</div>';
      h += '<div class="mindmap-svg" id="' + tid + '_map">' + renderMindMap(s.id, t.title, t.points) + '</div>';
    } else if (t.summary) {
      h += '<div class="si-body">' + simpleMd(t.summary) + '</div>';
    }
    h += '</div>';
  }

  if (data.quiz) {
    h += '<div class="quiz-block"><div class="rb-label">📊 测验结果</div>';
    h += '<div class="qz">' + data.quiz.correct + '/' + data.quiz.total + ' 正确 · ' + data.quiz.accuracy + '</div>';
    if (data.quiz.wrong_items) h += '<div style="font-size:.73rem;color:var(--text2)">错题：' + data.quiz.wrong_items.map(function(w) { return escHtml(w); }).join('、') + '</div>';
    h += '</div>';
  }
  if (data.key_takeaways && data.key_takeaways.length) {
    h += '<div class="rb recall"><div class="rb-label recall">🧠 必记要点</div><ul>' + data.key_takeaways.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('') + '</ul></div>';
  }
  if (data.weak_points && data.weak_points.length) {
    h += '<div class="rb weak"><div class="rb-label weak">⚠️ 薄弱点</div><ul>' + data.weak_points.map(function(w) { return '<li>' + escHtml(w) + '</li>'; }).join('') + '</ul></div>';
  }
  if (data.tomorrow_note) {
    h += '<div class="rb"><div class="rb-label plan">📅 明日</div><ul><li>' + escHtml(data.tomorrow_note) + '</li></ul></div>';
  }

  h += '</div></div>';
  return h;
}

// Card management
function toggleReviewManage() {
  var mp = document.getElementById('managePanel');
  var btn = document.getElementById('btnManage');
  var show = mp.style.display === 'none' || !mp.style.display;
  mp.style.display = show ? 'block' : 'none';
  btn.textContent = show ? '⚙ 关闭管理' : '⚙ 管理卡片';

  if (show && !isLocalMode() && !getSyncToken()) {
    document.getElementById('syncSetup').style.display = 'block';
  }
  if (show) renderManage();
}

function renderManage() {
  var filter = document.getElementById('manageFilter').value;
  var cards = [];
  for (var id in reviewCards) {
    if (filter !== 'all' && reviewCards[id].subject !== filter) continue;
    cards.push(reviewCards[id]);
  }
  cards.sort(function(a, b) { return (a.next_review || Infinity) - (b.next_review || Infinity); });

  var h = '';
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var badgeCls = c.subject === 'english' ? 'ben' : c.subject === '807' ? 'b807' : 'b706';
    var meta = (c.reps || 0) + '次复习 · ' + fsrsIntervalText(c, Date.now());
    h += '<div class="manage-item">';
    h += '<div class="rq-badge ' + badgeCls + '"></div>';
    h += '<div class="mi-title">' + escHtml(c.title) + '</div>';
    h += '<div class="mi-meta">' + meta + '</div>';
    h += '<button class="mi-del" onclick="deleteCard(\'' + c.id + '\')">删除</button>';
    h += '</div>';
  }
  if (cards.length === 0) h = '<div class="empty"><p>暂无卡片</p></div>';
  document.getElementById('manageList').innerHTML = h;
}

function deleteCard(cardId) {
  if (!confirm('删除这张卡片？')) return;
  delete reviewCards[cardId];
  saveReviewStore();
  renderManage();
  renderReviewView();
}

function resetAllCards() {
  if (!confirm('确定删除全部复习卡片？此操作不可撤销。')) return;
  reviewCards = {};
  reviewHistory = [];
  saveReviewStore();
  // Re-import prebuilt cards after reset
  tryAutoImportPrebuilt().then(function() {
    renderManage();
    renderReviewView();
  });
}

// Export/import
function exportCards() {
  var blob = new Blob([JSON.stringify({ cards: reviewCards, history: reviewHistory, settings: reviewSettings }, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kaoyan_review_backup_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function importCards() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (data.cards) {
          var merged = {};
          for (var id in data.cards) merged[id] = data.cards[id];
          // Keep local cards that have more reviews
          for (var id in reviewCards) {
            var local = reviewCards[id];
            var imported = merged[id];
            if (!imported || (local.reps || 0) > (imported.reps || 0)) merged[id] = local;
          }
          reviewCards = merged;
          if (data.history) reviewHistory = data.history;
          if (data.settings) reviewSettings = data.settings;
          saveReviewStore();
          renderReviewView();
          renderManage();
          alert('导入完成：' + Object.keys(data.cards).length + ' 张卡片');
        }
      } catch(ex) { alert('导入失败：文件格式错误'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

// Update renderHome to include review card
var _origRenderHome = renderHome;
renderHome = function() {
  _origRenderHome();

  // Add review card to dashboard
  var now = Date.now();
  var dueCount = 0;
  for (var id in reviewCards) {
    if (fsrsIsDue(reviewCards[id], now)) dueCount++;
  }
  var totalCards = Object.keys(reviewCards).length;

  var dash = document.getElementById('dashboard');
  var dh = dash.innerHTML;
  dh += '<div class="dc rev" onclick="goReview()">';
  dh += '<div class="icon">📋</div><div class="name">复习调度</div>';
  dh += '<div class="pct">' + (dueCount > 0 ? dueCount + '张' : '无') + '</div>';
  dh += '<div class="info">' + totalCards + '张总 · 待复习</div>';
  dh += '</div>';
  dash.innerHTML = dh;
  dash.style.gridTemplateColumns = '1fr 1fr 1fr 1fr';
};

// goHome also hides review view
var _origGoHome = goHome;
goHome = function() {
  document.getElementById('reviewView').classList.remove('active');
  document.getElementById('managePanel').style.display = 'none';
  _origGoHome();
};

// Auto-load review_sync.json from GitHub Pages (phone) or local server (PC)
document.addEventListener('DOMContentLoaded', function() {
  loadReviewStore();
  loadSyncFromServer();
  // Auto-import prebuilt cards on first visit
  tryAutoImportPrebuilt();
});

async function tryAutoImportPrebuilt() {
  if (Object.keys(reviewCards).length > 0) return;  // Already has cards
  try {
    var r = await fetch('./prebuilt_cards.json?t=' + Date.now());
    if (!r.ok) return;
    var data = await r.json();
    if (!data.cards) return;
    for (var id in data.cards) {
      data.cards[id].created_at = Date.now();
    }
    reviewCards = data.cards;
    saveReviewStore();
    console.log('预建卡片已导入: ' + Object.keys(data.cards).length + ' 张');
  } catch(_) {}
}

function showVoiceDebug() {
  var overlay = document.getElementById('dbgOverlay');
  overlay.classList.add('show');
  refreshVoiceDebug();
}
function hideVoiceDebug() {
  document.getElementById('dbgOverlay').classList.remove('show');
  window.speechSynthesis.cancel();
}

function refreshVoiceDebug() {
  var voices = speechSynthesis.getVoices();
  var note = document.getElementById('dbgNote');
  var table = document.getElementById('dbgTable');

  if (!voices || voices.length === 0) {
    note.textContent = '语音列表为空 — 请稍候再点（iOS 异步加载中），或者刷新页面后等 2 秒再试。';
    table.innerHTML = '';
    return;
  }

  // 找出当前 pickVoice 选中的语音
  var zhPicked = pickVoice('zh-CN');
  var enPicked = pickVoice('en-US');
  var pickedURI = {};
  if (zhPicked) pickedURI[zhPicked.voiceURI] = 'zh-CN';
  if (enPicked) pickedURI[enPicked.voiceURI] = 'en-US';

  note.innerHTML = '共 <b>' + voices.length + '</b> 个语音。高亮行 = <b>当前 pickVoice() 选中</b>（zh-CN / en-US）。点 ▶ 试听。';

  // 按 lang 分组排序
  voices.sort(function(a, b) {
    if (a.lang !== b.lang) return a.lang.localeCompare(b.lang);
    return (a.name || '').localeCompare(b.name || '');
  });

  var h = '<thead><tr><th>语言</th><th>名称</th><th>voiceURI</th><th>默认</th><th>试听</th></tr></thead><tbody>';
  for (var i = 0; i < voices.length; i++) {
    var v = voices[i];
    var uri = v.voiceURI || '';
    var picked = pickedURI[uri];
    var hi = picked ? ' class="hi"' : '';
    var def = v.default ? '✓' : '';
    var langLabel = picked ? '<b>' + picked + '</b>' : v.lang;
    h += '<tr' + hi + '>';
    h += '<td>' + langLabel + '</td>';
    h += '<td>' + escHtml(v.name || '') + '</td>';
    h += '<td style="font-size:.65rem;word-break:break-all">' + escHtml(uri) + '</td>';
    h += '<td>' + def + '</td>';
    h += '<td><button class="dbg-play" data-uri="' + escHtml(uri) + '" onclick="testVoice(this.getAttribute(\'data-uri\'))">▶</button></td>';
    h += '</tr>';
  }
  h += '</tbody>';
  table.innerHTML = h;
}

function testVoice(voiceURI) {
  window.speechSynthesis.cancel();
  var voices = speechSynthesis.getVoices();
  var voice = null;
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].voiceURI === voiceURI) { voice = voices[i]; break; }
  }
  if (!voice) return;
  var u = new SpeechSynthesisUtterance('你好，这是语音测试。用于确认该语音是否为你在系统设置中选择的Siri男声。');
  u.voice = voice;
  u.lang = voice.lang;
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}
