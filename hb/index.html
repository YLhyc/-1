*{margin:0;padding:0;box-sizing:border-box}

.jump-row{display:flex;gap:8px;margin-bottom:16px}

.unit-btn{background:#fff;border:none;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;font-size:14px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.04);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;-webkit-appearance:none;outline:none}

.unit-progress{width:100%;height:3px;background:#e0e0e0;border-radius:2px;margin-top:4px}

.nav-back{background:none;border:none;color:#007aff;font-size:16px;cursor:pointer;padding:6px 0}
.nav-title{font-size:17px;font-weight:600}

.group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.group-label{font-size:15px;font-weight:600}
.group-stat{font-size:12px;color:#86868b}
.word-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.word-swipe{position:relative;overflow:hidden;border-radius:10px}
.ws-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.ws-btn{min-width:50px;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:0 10px;-webkit-appearance:none;outline:none}
.ws-btn:active{filter:brightness(.85)}
.ws-familiar{background:#34c759}
.ws-hard{background:#ff9500}
.ws-reset{background:#8e8e93}
.word-block{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#f9f9fb;transition:transform .25s ease,background .2s;position:relative;z-index:1}
.word-block.active{background:#d4f5d4}
.wb-num{font-size:11px;color:#bbb;width:20px;text-align:right;flex-shrink:0}
.wb-en{font-weight:700;font-size:16px;color:#1d1d1f;flex:1}
.word-block.active .wb-en{color:#0a6e0a}
.wb-cn{font-size:14px;color:#86868b;flex:2}
.word-block.active .wb-cn{color:#2d7d2d}
.wb-step{font-size:11px;color:#bbb;white-space:nowrap;display:none}
.word-block.active .wb-step{display:inline}
.wb-badge{font-size:10px;font-weight:700;margin-left:2px;padding:1px 5px;border-radius:4px;display:none}
.wb-badge.wb-familiar{display:inline;background:#d4f5d4;color:#0a6e0a}
.wb-badge.wb-hard{display:inline;background:#ffe0cc;color:#cc6600}

.btn-row{display:flex;gap:7px;align-items:center}
.btn-row-top{margin-bottom:8px}
.btn{height:40px;border:none;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s;-webkit-appearance:none;outline:none}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-play{flex:3;background:#007aff;color:#fff}
.btn-play.playing{background:#ff9500}
.btn-play.paused{background:#34c759}
.btn-skip{flex:1.5;background:#f0f0f5;color:#1d1d1f}
.btn-rewind{flex:1.5;background:#f0f0f5;color:#1d1d1f}
.btn-prev{flex:1.5;background:#f0f0f5;color:#1d1d1f}
.btn:disabled{opacity:.35;pointer-events:none}

var UNIT_COUNT = 219;
var UNIT_SIZE = 30;
var GROUP_SIZE = 10;
var TS = 1782356599;

// ── State ──
var curUnit = -1;
var wIdx = 0, step = 0, paused = false, single = false;
var curAudio = null;
var auA = null, auB = null, curSlot = 0, auUrlA = null, auUrlB = null;

function $(id) { return document.getElementById(id); }
function showView(v) {
  $('view-units').style.display = v==='units'?'block':'none';
  $('view-groups').style.display = v==='groups'?'block':'none';
}

// ── Prefs ──
function prefs() {
  try { return JSON.parse(localStorage.getItem('hb_prefs')||'{}'); } catch(e) { return {}; }
}
function savePrefs(obj) { localStorage.setItem('hb_prefs', JSON.stringify(obj)); }

// ── Unit list ──
function globalIdx(u, g, w) { return u * UNIT_SIZE + g * GROUP_SIZE + w; }
function wordsInUnit(u) {
  var start = u * UNIT_SIZE;
  return WORDS.slice(start, Math.min(start + UNIT_SIZE, WORDS.length));
}

function renderUnits() {
  var p = prefs(), h = '';
  for (var u = 0; u < UNIT_COUNT; u++) {
    var ws = wordsInUnit(u), marked = 0, fam = 0;
    for (var w = 0; w < ws.length; w++) {
      var k = String(u * UNIT_SIZE + w);
      if (p[k] === 'familiar') { marked++; fam++; }
      else if (p[k]) marked++;
    }
    var pct = Math.round(marked / ws.length * 100);
    h += '<button class="unit-btn' + (pct>0?' has-progress':'') + '" onclick="openUnit(' + u + ')">';
    h += 'U' + (u+1);
    h += '<span class="u-label">' + ws.length + '词' + (fam>0?' · '+fam+'熟':'') + '</span>';
    if (pct > 0) h += '<div class="unit-progress"><div class="unit-progress-bar" style="width:' + pct + '%"></div></div>';
    h += '</button>';
  }
  $('unitGrid').innerHTML = h;
}

function jumpToUnit() {
  var v = parseInt($('jumpInput').value);
  if (isNaN(v) || v < 1 || v > UNIT_COUNT) {
    $('jumpInput').style.borderColor = '#ff3b30';
    setTimeout(function() { $('jumpInput').style.borderColor = '#e0e0e0'; }, 1000);
    return;
  }
  openUnit(v - 1);
}

// ── Audio URL ──
function mp3Url(globalW, lang) {
  return 'audio/w' + globalW + '_' + lang + '.mp3?v=' + TS;
}

// ── Group rendering ──
function openUnit(u) {
  stop(); curUnit = u; wIdx = 0; step = 0; paused = false; single = false;
  showView('groups');
  var ws = wordsInUnit(u);
  var start = u * UNIT_SIZE + 1;
  var end = start + ws.length - 1;
  $('groupTitle').textContent = 'Unit ' + (u+1) + ' (' + start + '-' + end + '词)';
  renderGroups();
  setBtns(false, false);
  preloadUnit(u);
}

function showUnits() {
  stop(); curUnit = -1; showView('units'); renderUnits();
}

function nextUnit() {
  if (curUnit + 1 < UNIT_COUNT) openUnit(curUnit + 1);
}
function prevUnit() {
  if (curUnit > 0) openUnit(curUnit - 1);
}

function renderGroups() {
  var ws = wordsInUnit(curUnit);
  var p = prefs();
  var groups = Math.ceil(ws.length / GROUP_SIZE), h = '', totalFam = 0;
  for (var g = 0; g < groups; g++) {
    var start = g * GROUP_SIZE, end = Math.min(start + GROUP_SIZE, ws.length);
    var groupWords = ws.slice(start, end);
    var gFam = 0;
    var gH = '';
    for (var w = 0; w < groupWords.length; w++) {
      var gw = globalIdx(curUnit, g, w);
      var pref = p[String(gw)];
      if (pref === 'familiar') { gFam++; totalFam++; }
      gH += '<div class="word-swipe" id="ws' + g + '_' + w + '">'
        + '<div class="ws-actions">'
        + '<button class="ws-btn ws-familiar" data-g="' + g + '" data-w="' + w + '" data-act="familiar">熟</button>'
        + '<button class="ws-btn ws-hard" data-g="' + g + '" data-w="' + w + '" data-act="hard">难</button>'
        + '<button class="ws-btn ws-reset" data-g="' + g + '" data-w="' + w + '" data-act="reset">恢复</button>'
        + '</div>'
        + '<div class="word-block" id="wb' + g + '_' + w + '" onclick="playSingleW(' + g + ',' + w + ')">'
        + '<div class="wb-num">' + (start + w + 1) + '</div>'
        + '<div class="wb-en">' + esc(groupWords[w].en) + '</div>'
        + '<div class="wb-cn">' + esc(groupWords[w].cn) + '</div>'
        + '<div class="wb-step"></div>'
        + '<div class="wb-badge"></div>'
        + '</div></div>';
    }
    h += '<div class="word-group"><div class="group-header">'
      + '<span class="group-label">第' + (g+1) + '组</span>'
      + '<span class="group-stat">' + groupWords.length + '词 · ' + gFam + '熟</span>'
      + '</div><div class="word-list">' + gH + '</div></div>';
  }
  $('groupContainer').innerHTML = h;
  updateBadges();
}

function updateBadges() {
  var ws = wordsInUnit(curUnit), p = prefs();
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var g = 0; g < groups; g++) {
    var end = Math.min((g+1) * GROUP_SIZE, ws.length);
    for (var w = g * GROUP_SIZE; w < end; w++) {
      var lw = w - g * GROUP_SIZE;
      var bd = document.querySelector('#wb' + g + '_' + lw + ' .wb-badge');
      if (!bd) continue;
      var pref = p[String(globalIdx(curUnit, g, lw))];
      bd.className = 'wb-badge'; bd.textContent = '';
      if (pref === 'familiar') { bd.classList.add('wb-familiar'); bd.textContent = '熟'; }
      else if (pref === 'hard') { bd.classList.add('wb-hard'); bd.textContent = '难'; }
    }
  }
}

function hl(g, w) {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
  var wb = $('wb' + g + '_' + w);
  if (wb) wb.classList.add('active');
}

function clearHl() {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
}

// ── Prefs ──
function setPref(g, w, act) {
  var key = String(globalIdx(curUnit, g, w)), p = prefs();
  if (act === 'reset') delete p[key]; else p[key] = act;
  savePrefs(p); updateBadges();
  var ws = wordsInUnit(curUnit);
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var gi = 0; gi < groups; gi++) {
    var end = Math.min((gi+1) * GROUP_SIZE, ws.length);
    var fam = 0;
    for (var wi = gi * GROUP_SIZE; wi < end; wi++) {
      if (p[String(globalIdx(curUnit, gi, wi - gi*GROUP_SIZE))] === 'familiar') fam++;
    }
    var gh = document.querySelector('#groupContainer .word-group:nth-child('+(gi+1)+') .group-stat');
    if (gh) gh.textContent = (end - gi*GROUP_SIZE) + '词 · ' + fam + '熟';
  }
  var el = $('ws' + g + '_' + w); if (el) setTimeout(function(){closeSw(el)}, 200);
}

// ── Playback (AB direct swap) ──
function getAu(slot) {
  if (slot === 0) { if (!auA) auA = new Audio(); return auA; }
  if (!auB) auB = new Audio(); return auB;
}
function loadAu(slot, url) {
  var au = getAu(slot);
  var prev = slot === 0 ? auUrlA : auUrlB;
  if (prev !== url) { au.src = url; if (slot === 0) auUrlA = url; else auUrlB = url; }
}

function getWordLabels(globalW) {
  var pf = prefs()[String(globalW)];
  if (pf === 'familiar') return {labels: ['英①','中①'], isENs: [true, false]};
  if (pf === 'hard') return {labels: ['英①','中①','英②','中②','英③','中③'], isENs: [true,false,true,false,true,false]};
  return {labels: ['英①','中①','英②','中②'], isENs: [true,false,true,false]};
}
function segUrl(globalW, ns) {
  if (ns < 0) return null;
  var info = getWordLabels(globalW);
  if (ns >= info.labels.length) return null;
  var lang = info.isENs[ns] ? 'en' : 'cn';
  return mp3Url(globalW, lang);
}
function nextStepAfter(ns, nw) {
  var gw = curUnit * UNIT_SIZE + nw;
  var info = getWordLabels(gw);
  if (ns + 1 < info.labels.length) return {step: ns + 1, wIdx: nw};
  if (single) return null;
  var ws = wordsInUnit(curUnit);
  if (nw + 1 < ws.length) return {step: 0, wIdx: nw + 1};
  return null;
}

function onSegEnd() {
  var au = getAu(1 - curSlot);
  curSlot = 1 - curSlot;
  curAudio = au;
  au.playbackRate = 1.0;
  var w = wordsInUnit(curUnit);
  var g = Math.floor(wIdx / GROUP_SIZE);
  var lw = wIdx % GROUP_SIZE;
  hl(g, lw);

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var url = segUrl(curUnit * UNIT_SIZE + nx.wIdx, nx.step);
    if (url) loadAu(1 - curSlot, url);
  }
}

function playWord() {
  var ws = wordsInUnit(curUnit);
  if (wIdx >= ws.length) { done(); return; }

  var globalW = curUnit * UNIT_SIZE + wIdx;
  var url = segUrl(globalW, step);
  if (!url) { done(); return; }

  loadAu(curSlot, url);
  var au = getAu(curSlot);
  curAudio = au;
  au.playbackRate = 1.0;
  var g = Math.floor(wIdx / GROUP_SIZE);
  var lw = wIdx % GROUP_SIZE;
  hl(g, lw);

  var segDone = false;
  function next() { if (!segDone) { segDone = true; step++; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  // Preload next segment
  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var nu = segUrl(curUnit * UNIT_SIZE + nx.wIdx, nx.step);
    if (nu) loadAu(1 - curSlot, nu);
  }
}

// ── Controls ──
function stop() {
  if (auA) { auA.onended=null; auA.onerror=null; auA.pause(); auA.removeAttribute('src'); }
  if (auB) { auB.onended=null; auB.onerror=null; auB.pause(); auB.removeAttribute('src'); }
  auUrlA = null; auUrlB = null;
  curAudio = null;
}

function setBtns(playing, loading) {
  var playIcon = '<path d="M8 5v14l11-7z"/>';
  var pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  var isLoading = !!loading;
  ['btnPlay','btnPlayTop'].forEach(function(id) {
    var b = $(id); if (!b) return;
    var icon = b.querySelector('.play-icon'), label = b.querySelector('.btn-label');
    b.disabled = isLoading;
    b.classList.remove('playing','paused');
    if (isLoading) { icon.innerHTML = playIcon; label.textContent = '加载中…'; return; }
    if (playing) { b.classList.add('playing'); icon.innerHTML = pauseIcon; label.textContent = '播放中'; }
    else { icon.innerHTML = playIcon; label.textContent = '朗读'; }
  });
}

function done() {
  stop(); clearHl(); setBtns(false, false);
  wIdx = 0; step = 0; paused = false; single = false;
}

function togglePlay() {
  if (curAudio && !curAudio.ended && !curAudio.paused) {
    curAudio.pause(); paused = true; setBtns(false, false);
  } else if (curAudio && paused) {
    curAudio.play(); paused = false; setBtns(true, false);
  } else {
    stop(); wIdx = 0; step = 0; paused = false; single = false;
    setBtns(true, false);
    playWord();
  }
}

function playSingleW(g, w) {
  stop();
  wIdx = g * GROUP_SIZE + w; step = 0; paused = false; single = true;
  setBtns(true, false);
  playWord();
}

// ── Preload ──
var preloaded = {};
var preloadDone = false;

function preloadUnit(u) {
  preloaded = {}; preloadDone = false;
  var ws = wordsInUnit(u);
  var INIT = Math.min(3, ws.length), total = INIT * 2, got = 0;
  function inc() { got++; if (got >= total) { preloadDone = true; prewarmRest(u, ws.length); } }
  for (var w = 0; w < INIT; w++) {
    ['en','cn'].forEach(function(l) {
      var globalW = u * UNIT_SIZE + w;
      var k = globalW + '_' + l;
      fetch(mp3Url(globalW, l)).then(function(r){return r.blob()}).then(function(blob){
        preloaded[k] = URL.createObjectURL(blob); inc();
      }).catch(function(){ inc(); });
    });
  }
  if (ws.length <= INIT) setBtns(false, false);
}

function prewarmRest(u, n) {
  var next = Math.min(3, n);
  function loadBatch() {
    var start = next, end = Math.min(start + 3, n);
    if (start >= n) return;
    var batch = 0, need = (end - start) * 2;
    function doneBatch() { batch++; if (batch >= need) { next = end; loadBatch(); } }
    for (var w = start; w < end; w++) {
      ['en','cn'].forEach(function(l) {
        var globalW = u * UNIT_SIZE + w;
        var k = globalW + '_' + l;
        fetch(mp3Url(globalW, l)).then(function(r){return r.blob()}).then(function(blob){
          preloaded[k] = URL.createObjectURL(blob); doneBatch();
        }).catch(function(){ doneBatch(); });
      });
    }
  }
  loadBatch();
}

// Override mp3Url to use preloaded blob when available
var _mp3Url = mp3Url;
mp3Url = function(globalW, lang) {
  var k = globalW + '_' + lang;
  return preloaded[k] || _mp3Url(globalW, lang);
};

// ── Swipe ──
var swOpen = null, swCur = null, swX = 0, swY = 0, swTX = 0, swBlk = null;
function closeSw(el) {
  if (!el) el = swOpen;
  if (el) {
    var b = el.querySelector('.word-block');
    if (b) b.style.transform = 'translateX(0)';
    el.classList.remove('swiped');
  }
  if (swOpen === el || !el) swOpen = null;
}

document.addEventListener('touchstart', function(e){
  var sw = e.target.closest('.word-swipe');
  if (!sw) { closeSw(); swCur = null; swBlk = null; return; }
  if (swOpen && swOpen !== sw) closeSw(swOpen);
  swCur = sw; swBlk = sw.querySelector('.word-block');
  swX = e.touches[0].clientX; swY = e.touches[0].clientY; swTX = 0;
  if (swBlk) { var m = swBlk.style.transform.match(/-?[0-9.]+/); if (m) swTX = parseFloat(m[0]); }
},{passive:true});

document.addEventListener('touchmove', function(e){
  if (!swCur) return;
  var dx = e.touches[0].clientX - swX, dy = e.touches[0].clientY - swY;
  if (Math.abs(dy) > Math.abs(dx)) { closeSw(swCur); return; }
  if (dx > 10) { closeSw(swCur); return; }
  e.preventDefault();
  var tx = Math.max(-150, Math.min(0, swTX + dx));
  if (swBlk) { swBlk.style.transition = 'none'; swBlk.style.transform = 'translateX(' + tx + 'px)'; }
},{passive:false});

document.addEventListener('touchend', function(){
  if (!swCur || !swBlk) { swCur = null; swBlk = null; return; }
  swBlk.style.transition = 'transform .25s ease';
  var m = swBlk.style.transform.match(/-?[0-9.]+/), tx = m ? parseFloat(m[0]) : 0;
  if (Math.abs(tx) > 50) { swBlk.style.transform = 'translateX(-150px)'; swCur.classList.add('swiped'); swOpen = swCur; }
  else { swBlk.style.transform = 'translateX(0)'; swCur.classList.remove('swiped'); swOpen = null; }
  swCur = null; swBlk = null;
});

document.addEventListener('click', function(e){
  if (!e.target.closest('.word-swipe')) closeSw();
  var wsBtn = e.target.closest('.ws-btn');
  if (wsBtn) {
    setPref(parseInt(wsBtn.dataset.g), parseInt(wsBtn.dataset.w), wsBtn.dataset.act);
    return;
  }
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
renderUnits();
</script>
