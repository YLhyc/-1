.group-stat{font-size:12px;color:#86868b}
.word-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.word-swipe{position:relative;overflow:hidden;border-radius:10px}

.ws-btn{min-width:50px;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:0 10px;-webkit-appearance:none;outline:none}

.ws-familiar{background:#34c759}
.ws-hard{background:#ff9500}

var UNIT_COUNT = 219;
var UNIT_SIZE = 30;
var GROUP_SIZE = 10;
var TS = 1783406819;

// ── Word-based key ──
function wordKey(u, g, w) {
  var idx = u * UNIT_SIZE + g * GROUP_SIZE + w;
  return idx < WORDS.length ? WORDS[idx].en : '_invalid_' + idx;
}

// ── State ──
var curUnit = -1, curGroup = -1;
var wIdx = 0, step = 0, paused = false, single = false;
var curAudio = null;
var auA = null, auB = null, curSlot = 0, auUrlA = null, auUrlB = null;

function $(id) { return document.getElementById(id); }
function showView(v) {
  $('view-units').style.display = v==='units'?'block':'none';
  $('view-groups').style.display = v==='groups'?'block':'none';
}

// ── Prefs ──
function prefs() {
  try { return JSON.parse(localStorage.getItem('hb_prefs')||'{}'); } catch(e) { return {}; }
}
function savePrefs(obj) { localStorage.setItem('hb_prefs', JSON.stringify(obj)); }

// ── Unit list ──
function globalIdx(u, g, w) { return u * UNIT_SIZE + g * GROUP_SIZE + w; }
function wordsInUnit(u) {
  var start = u * UNIT_SIZE;
  return WORDS.slice(start, Math.min(start + UNIT_SIZE, WORDS.length));
}
function wordsInGroup(g) {
  var ws = wordsInUnit(curUnit);
  var start = g * GROUP_SIZE;
  return ws.slice(start, Math.min(start + GROUP_SIZE, ws.length));
}

function renderUnits() {
  var p = prefs(), h = '';
  for (var u = 0; u < UNIT_COUNT; u++) {
    var ws = wordsInUnit(u), marked = 0, fam = 0;
    for (var w = 0; w < ws.length; w++) {
      var k = ws[w].en;
      if (p[k] === 'familiar') { marked++; fam++; }
      else if (p[k]) marked++;
    }
    var pct = Math.round(marked / ws.length * 100);
    h += '<button class="unit-btn' + (pct>0?' has-progress':'') + '" onclick="openUnit(' + u + ')">';
    h += 'U' + (u+1);
    h += '<span class="u-label">' + ws.length + '词' + (fam>0?' · '+fam+'熟':'') + '</span>';
    if (pct > 0) h += '<div class="unit-progress"><div class="unit-progress-bar" style="width:' + pct + '%"></div></div>';
    h += '</button>';
  }
  $('unitGrid').innerHTML = h;
}

function jumpToUnit() {
  var v = parseInt($('jumpInput').value);
  if (isNaN(v) || v < 1 || v > UNIT_COUNT) {
    $('jumpInput').style.borderColor = '#ff3b30';
    setTimeout(function() { $('jumpInput').style.borderColor = '#e0e0e0'; }, 1000);
    return;
  }
  openUnit(v - 1);
}

function saveCounts(obj) { localStorage.setItem('hb_counts', JSON.stringify(obj)); }
function updateCount(g, w) {
  var cnt = (loadCounts()[wordKey(curUnit, g, w)] || 0);
  var el = document.querySelector('#wb' + g + '_' + w + ' .wb-count');
  if (el) el.textContent = cnt > 0 ? cnt : '';
}
function updateAllCounts() {
  if (curUnit < 0) return;
  var ws = wordsInUnit(curUnit);
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var g = 0; g < groups; g++) {
    for (var w = 0; w < GROUP_SIZE; w++) updateCount(g, w);
  }
}

// ── Audio: unit-level JSON bundles (base64 → blob URL) ──
var audioBundles = {}; // unitIdx → 'loading' | true
var audioBundleCbs = {}; // unitIdx → [callbacks]

function b64toBlob(b64) {
  var raw = atob(b64), bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], {type: 'audio/mpeg'}));
}

function loadAudioBundle(u, cb) {
  if (audioBundles[u] === true) { if (cb) cb(); return; }
  if (cb) {
    if (!audioBundleCbs[u]) audioBundleCbs[u] = [];
    audioBundleCbs[u].push(cb);
  }
  if (audioBundles[u] === 'loading') return;
  audioBundles[u] = 'loading';

  fetch('audio_unit' + u + '.json?v=' + TS)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (u !== curUnit) return; // Stale request, ignore
      audioBundles[u] = true;
      for (var w = 0; w < data.words.length; w++) {
        if (!data.words[w]) continue;
        var globalW = u * UNIT_SIZE + w;
        preloaded[globalW + '_en'] = b64toBlob(data.words[w].en);
        preloaded[globalW + '_cn'] = b64toBlob(data.words[w].cn);
      }
      if (u === curUnit) {
        var groups = Math.ceil(wordsInUnit(u).length / GROUP_SIZE);
        for (var gi = 0; gi < groups; gi++) setBtns(gi, false, false);
      }
      preloadDone = true;
      var cbs = audioBundleCbs[u];
      if (cbs) { cbs.forEach(function(fn) { fn(); }); delete audioBundleCbs[u]; }
    })
    .catch(function() {
      delete audioBundles[u];
      var cbs = audioBundleCbs[u];
      if (cbs) { cbs.forEach(function(fn) { fn('err'); }); delete audioBundleCbs[u]; }
    });
}

function mp3Url(globalW, lang) {
  var k = globalW + '_' + lang;
  if (preloaded[k]) return preloaded[k];
  return null;
}

// ── Group rendering ──
function openUnit(u) {
  stop(); curUnit = u; curGroup = -1; wIdx = 0; step = 0; paused = false; single = false;
  showView('groups');
  var ws = wordsInUnit(u);
  var start = u * UNIT_SIZE + 1;
  var end = start + ws.length - 1;
  $('groupTitle').textContent = 'Unit ' + (u+1) + ' (' + start + '-' + end + '词)';
  renderGroups();
  updateAllCounts();
  preloadUnit(u);
}

function showUnits() {
  stop(); curUnit = -1; curGroup = -1; showView('units'); renderUnits();
}

function nextUnit() {
  if (curUnit + 1 < UNIT_COUNT) openUnit(curUnit + 1);
}
function prevUnit() {
  if (curUnit > 0) openUnit(curUnit - 1);
}

function renderGroups() {
  var ws = wordsInUnit(curUnit);
  var p = prefs();
  var groups = Math.ceil(ws.length / GROUP_SIZE), h = '', totalFam = 0;
  for (var g = 0; g < groups; g++) {
    var start = g * GROUP_SIZE, end = Math.min(start + GROUP_SIZE, ws.length);
    var groupWords = ws.slice(start, end);
    var gFam = 0;
    var gH = '';
    for (var w = 0; w < groupWords.length; w++) {
      var pref = p[wordKey(curUnit, g, w)];
      if (pref === 'familiar') { gFam++; totalFam++; }
      gH += '<div class="word-swipe" id="ws' + g + '_' + w + '">'
        + '<div class="ws-actions">'
        + '<button class="ws-btn ws-familiar" data-g="' + g + '" data-w="' + w + '" data-act="familiar">熟</button>'
        + '<button class="ws-btn ws-hard" data-g="' + g + '" data-w="' + w + '" data-act="hard">难</button>'
        + '<button class="ws-btn ws-reset" data-g="' + g + '" data-w="' + w + '" data-act="reset">恢复</button>'
        + '</div>'
        + '<div class="word-block" id="wb' + g + '_' + w + '" onclick="playSingleW(' + g + ',' + w + ')">'
        + '<div class="wb-num">' + (start + w + 1) + '</div>'
        + '<div class="wb-en">' + esc(groupWords[w].en) + '</div>'
        + '<div class="wb-cn">' + esc(groupWords[w].cn) + '</div>'
        + '<div class="wb-step"></div>'
        + '<div class="wb-count"></div>'
        + '<div class="wb-badge"></div>'
        + '</div></div>';
    }
    h += '<div class="word-group"><div class="group-header">'
      + '<span class="group-label">第' + (g+1) + '组</span>'
      + '<span class="group-stat">' + groupWords.length + '词 · ' + gFam + '熟</span>'
      + '</div><div class="word-list">' + gH + '</div>'+ '<div class="btn-row btn-group-row">'+ '<button class="btn btn-play" id="btnPlay' + g + '" onclick="togglePlay(' + g + ')">'+ '<svg viewBox="0 0 24 24" fill="currentColor" class="play-icon"><path d="M8 5v14l11-7z"/></svg>'+ '<span class="btn-label">朗读</span></button>'+ '<button class="btn btn-skipword" id="btnSkipWord' + g + '" onclick="skipWord(' + g + ')" disabled>⏭ 跳过</button>'+ '<button class="btn btn-rewind" onclick="doRewind(' + g + ')">↺</button>'+ '</div></div>';
  }
  $('groupContainer').innerHTML = h;
  updateBadges();
}

function updateBadges() {
  var ws = wordsInUnit(curUnit), p = prefs();
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var g = 0; g < groups; g++) {
    var end = Math.min((g+1) * GROUP_SIZE, ws.length);
    for (var w = g * GROUP_SIZE; w < end; w++) {
      var lw = w - g * GROUP_SIZE;
      var bd = document.querySelector('#wb' + g + '_' + lw + ' .wb-badge');
      if (!bd) continue;
      var pref = p[wordKey(curUnit, g, lw)];
      bd.className = 'wb-badge'; bd.textContent = '';
      if (pref === 'familiar') { bd.classList.add('wb-familiar'); bd.textContent = '熟'; }
      else if (pref === 'hard') { bd.classList.add('wb-hard'); bd.textContent = '难'; }
    }
  }
}

function hl(g, w) {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
  var wb = $('wb' + g + '_' + w);
  if (wb) wb.classList.add('active');
}

function clearHl() {
  document.querySelectorAll('#groupContainer .word-block.active').forEach(function(el){el.classList.remove('active')});
}

// ── Prefs ──
function setPref(g, w, act) {
  var key = wordKey(curUnit, g, w), p = prefs();
  if (act === 'reset') delete p[key]; else p[key] = act;
  savePrefs(p); updateBadges();
  var ws = wordsInUnit(curUnit);
  var groups = Math.ceil(ws.length / GROUP_SIZE);
  for (var gi = 0; gi < groups; gi++) {
    var end = Math.min((gi+1) * GROUP_SIZE, ws.length);
    var fam = 0;
    for (var wi = gi * GROUP_SIZE; wi < end; wi++) {
      if (p[wordKey(curUnit, gi, wi - gi*GROUP_SIZE)] === 'familiar') fam++;
    }
    var gh = document.querySelector('#groupContainer .word-group:nth-child('+(gi+1)+') .group-stat');
    if (gh) gh.textContent = (end - gi*GROUP_SIZE) + '词 · ' + fam + '熟';
  }
  var el = $('ws' + g + '_' + w); if (el) setTimeout(function(){closeSw(el)}, 200);
}

// ── Playback (AB direct swap) ──
function getAu(slot) {
  if (slot === 0) { if (!auA) auA = new Audio(); return auA; }
  if (!auB) auB = new Audio(); return auB;
}
function loadAu(slot, url) {
  var au = getAu(slot);
  var prev = slot === 0 ? auUrlA : auUrlB;
  if (prev !== url) { au.src = url; if (slot === 0) auUrlA = url; else auUrlB = url; }
}

function getWordLabels(w) {
  var pf = prefs()[wordKey(curUnit, curGroup, w)];
  if (pf === 'familiar') return {labels: ['英①','中①'], isENs: [true, false]};
  if (pf === 'hard') return {labels: ['英①','英②','中①','中②','英③','中③','英④','中④','英⑤','中⑤','英⑥','中⑥'], isENs: [true,true,false,false,true,false,true,false,true,false,true,false]};
  return {labels: ['英①','英②','中①','中②','英③','中③','英④','中④'], isENs: [true,true,false,false,true,false,true,false]};
}
function segUrl(w, ns) {
  if (ns < 0) return null;
  var info = getWordLabels(w);
  if (ns >= info.labels.length) return null;
  var lang = info.isENs[ns] ? 'en' : 'cn';
  var globalW = curUnit * UNIT_SIZE + curGroup * GROUP_SIZE + w;
  return mp3Url(globalW, lang);
}
function nextStepAfter(ns, nw) {
  var info = getWordLabels(nw);
  if (ns + 1 < info.labels.length) return {step: ns + 1, wIdx: nw};
  if (single) return null;
  var ws = wordsInGroup(curGroup);
  if (nw + 1 < ws.length) return {step: 0, wIdx: nw + 1};
  return null;
}

function stop() {
  if (auA) { auA.onended=null; auA.onerror=null; auA.pause(); auA.removeAttribute('src'); }
  if (auB) { auB.onended=null; auB.onerror=null; auB.pause(); auB.removeAttribute('src'); }
  auUrlA = null; auUrlB = null;
  curAudio = null;
  var groups = Math.ceil(wordsInUnit(curUnit).length / GROUP_SIZE);
  for (var gi = 0; gi < groups; gi++) setBtns(gi, false, false);
}

function done() {
  clearHl(); setBtns(curGroup, false, false);
  wIdx = 0; step = 0; paused = false; single = false; curGroup = -1;
}

function onSegEnd() {
  var au = getAu(1 - curSlot);
  curSlot = 1 - curSlot;
  curAudio = au;
  au.playbackRate = 1.0;
  hl(curGroup, wIdx);

  if (step === 0) {
    var cnts = loadCounts();
    cnts[wordKey(curUnit, curGroup, wIdx)] = (cnts[wordKey(curUnit, curGroup, wIdx)] || 0) + 1;
    saveCounts(cnts);
    updateCount(curGroup, wIdx);
  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var url = segUrl(nx.wIdx, nx.step);
    if (url) loadAu(1 - curSlot, url);
  }
}

function playWord() {
  var ws = wordsInGroup(curGroup);
  if (wIdx >= ws.length) { done(); return; }

  var url = segUrl(wIdx, step);
  if (!url) {
    // Audio bundle not loaded yet — wait and retry
    setBtns(curGroup, false, true);
    var globalW = curUnit * UNIT_SIZE + curGroup * GROUP_SIZE + wIdx;
    var u = Math.floor(globalW / UNIT_SIZE);
    var _g = curGroup;
    loadAudioBundle(u, function(err) {
      if (err || curGroup !== _g) { done(); return; }
      setBtns(_g, true, false);
      playWord();
    });
    return;
  }

  loadAu(curSlot, url);
  var au = getAu(curSlot);
  curAudio = au;
  au.playbackRate = 1.0;
  hl(curGroup, wIdx);

  if (step === 0) {
    var cnts = loadCounts();
    var kk = wordKey(curUnit, curGroup, wIdx);
    cnts[kk] = (cnts[kk] || 0) + 1;
    saveCounts(cnts);
    updateCount(curGroup, wIdx);
  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var nu = segUrl(nx.wIdx, nx.step);
    if (nu) loadAu(1 - curSlot, nu);
  }
}

function setBtns(gIdx, playing, loading) {
  var playIcon = '<path d="M8 5v14l11-7z"/>';
  var pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  var isLoading = !!loading;
  var playBtn = $('btnPlay' + gIdx);
  if (playBtn) {
    var icon = playBtn.querySelector('.play-icon'), label = playBtn.querySelector('.btn-label');
    playBtn.disabled = isLoading;
    playBtn.classList.remove('playing','paused');
    if (isLoading) { icon.innerHTML = playIcon; label.textContent = '加载中…'; }
    else if (playing) { playBtn.classList.add('playing'); icon.innerHTML = pauseIcon; label.textContent = '播放中'; }
    else { icon.innerHTML = playIcon; label.textContent = '朗读'; }
  }
  var skipBtn = $('btnSkipWord' + gIdx);
  if (skipBtn) skipBtn.disabled = isLoading || !playing;
}

function togglePlay(gIdx) {
  if (curGroup === gIdx && curAudio && !curAudio.ended && !curAudio.paused) {
    curAudio.pause(); paused = true; setBtns(gIdx, false, false);
  } else if (curGroup === gIdx && curAudio && paused) {
    curAudio.play(); paused = false; setBtns(gIdx, true, false);
  } else {
    stop();
    curGroup = gIdx; wIdx = 0; step = 0; paused = false; single = false;
    setBtns(gIdx, true, false);
    playWord();
  }
}

function playSingleW(g, w) {
  stop();
  curGroup = g; wIdx = w; step = 0; paused = false; single = true;
  setBtns(g, true, false);
  playWord();
}

function skipWord(gIdx) {
  stop();
  curGroup = gIdx; single = false;
  var ws = wordsInGroup(gIdx);
  if (wIdx + 1 >= ws.length) { done(); return; }
  step = 0; wIdx++;
  setBtns(gIdx, true, false);
  playWord();
}

function doRewind(gIdx) {
  stop();
  curGroup = gIdx; wIdx = 0; step = 0; paused = false; single = false;
  setBtns(gIdx, false, false);
}

// ── Preload (unit-level JSON bundles) ──
var preloaded = {};
var preloadDone = false;

function preloadUnit(u) {
  // Revoke old blob URLs to prevent memory leak
  for (var k in preloaded) { URL.revokeObjectURL(preloaded[k]); }
  preloaded = {}; preloadDone = false;
  audioBundles = {}; // Reset to force re-fetch on re-entry
  loadAudioBundle(u);
}

// ── Swipe ──
var swOpen = null, swCur = null, swX = 0, swY = 0, swTX = 0, swBlk = null;
function closeSw(el) {
  if (!el) el = swOpen;
  if (el) {
    var b = el.querySelector('.word-block');
    if (b) b.style.transform = 'translateX(0)';
    el.classList.remove('swiped');
  }
  if (swOpen === el || !el) swOpen = null;
}

document.addEventListener('touchstart', function(e){
  var sw = e.target.closest('.word-swipe');
  if (!sw) { closeSw(); swCur = null; swBlk = null; return; }
  if (swOpen && swOpen !== sw) closeSw(swOpen);
  swCur = sw; swBlk = sw.querySelector('.word-block');
  swX = e.touches[0].clientX; swY = e.touches[0].clientY; swTX = 0;
  if (swBlk) { var m = swBlk.style.transform.match(/-?[0-9.]+/); if (m) swTX = parseFloat(m[0]); }
},{passive:true});

document.addEventListener('touchmove', function(e){
  if (!swCur) return;
  var dx = e.touches[0].clientX - swX, dy = e.touches[0].clientY - swY;
  if (Math.abs(dy) > Math.abs(dx)) { closeSw(swCur); return; }
  if (dx > 10) { closeSw(swCur); return; }
  e.preventDefault();
  var tx = Math.max(-150, Math.min(0, swTX + dx));
  if (swBlk) { swBlk.style.transition = 'none'; swBlk.style.transform = 'translateX(' + tx + 'px)'; }
},{passive:false});

document.addEventListener('touchend', function(){
  if (!swCur || !swBlk) { swCur = null; swBlk = null; return; }
  swBlk.style.transition = 'transform .25s ease';
  var m = swBlk.style.transform.match(/-?[0-9.]+/), tx = m ? parseFloat(m[0]) : 0;
  if (Math.abs(tx) > 50) { swBlk.style.transform = 'translateX(-150px)'; swCur.classList.add('swiped'); swOpen = swCur; }
  else { swBlk.style.transform = 'translateX(0)'; swCur.classList.remove('swiped'); swOpen = null; }
  swCur = null; swBlk = null;
});

document.addEventListener('click', function(e){
  if (!e.target.closest('.word-swipe')) closeSw();
  var wsBtn = e.target.closest('.ws-btn');
  if (wsBtn) {
    setPref(parseInt(wsBtn.dataset.g), parseInt(wsBtn.dataset.w), wsBtn.dataset.act);
    return;
  }
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
renderUnits();
</script>
</body>
</html>
