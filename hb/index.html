<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#dceeff 0,#eef7ff 230px,#f7fafc 480px);color:#172232;padding:16px 16px 104px;padding-top:calc(env(safe-area-inset-top) + 16px);-webkit-tap-highlight-color:transparent;user-select:none}
button{font:inherit}

.hero{text-align:center;margin:28px 0 4px;font-size:24px;font-weight:800}
.hero-sub{text-align:center;color:#86868b;font-size:12px;margin-bottom:24px}

/* Unit grid */
.jump-row{display:flex;gap:8px;margin-bottom:16px}
.jump-input{flex:1;height:40px;border:1px solid #e0e0e0;border-radius:11px;padding:0 12px;font-size:15px;outline:none;-webkit-appearance:none}
.jump-btn{height:40px;border:none;border-radius:11px;background:#007aff;color:#fff;font-size:14px;font-weight:600;padding:0 18px;cursor:pointer;-webkit-appearance:none;outline:none}
.jump-btn:active{opacity:.7}

.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.unit-btn{background:#fff;border:none;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;font-size:14px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.04);display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .16s cubic-bezier(.23,1,.32,1),background-color .16s cubic-bezier(.23,1,.32,1);-webkit-appearance:none;outline:none}
.unit-btn:active{transform:scale(.95);opacity:.7}
.unit-btn.has-progress{background:#e8f5e9}
.unit-btn .u-label{font-size:10px;color:#86868b;font-weight:400}
.unit-progress{width:100%;height:3px;background:#e0e0e0;border-radius:2px;margin-top:4px}
.unit-progress-bar{height:100%;background:#34c759;border-radius:2px}

/* Group view */
.nav-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nav-back{background:none;border:none;color:#007aff;font-size:16px;cursor:pointer;padding:6px 0}
.nav-title{font-size:17px;font-weight:600}

.word-group{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.group-label{font-size:15px;font-weight:600}
.group-stat{font-size:12px;color:#86868b}
.word-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.word-swipe{position:relative;overflow:hidden;border-radius:10px}
.ws-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.ws-btn{min-width:50px;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:0 10px;-webkit-appearance:none;outline:none}
.ws-btn:active{filter:brightness(.85)}
.ws-familiar{background:#34c759}
.ws-hard{background:#ff9500}
.ws-reset{background:#8e8e93}
.word-block{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#f9f9fb;transition:transform .2s cubic-bezier(.23,1,.32,1);position:relative;z-index:1}
.word-block.active{background:#d4f5d4}
.wb-num{font-size:11px;color:#bbb;width:20px;text-align:right;flex-shrink:0}
.wb-en{font-weight:700;font-size:16px;color:#1d1d1f;flex:1}
.word-block.active .wb-en{color:#0a6e0a}
.wb-cn{font-size:14px;color:#86868b;flex:2}
.word-block.active .wb-cn{color:#2d7d2d}
.wb-step{font-size:11px;color:#bbb;white-space:nowrap;display:none}
.word-block.active .wb-step{display:inline}
.wb-count{font-size:9px;color:#aaa;font-weight:600;white-space:nowrap;min-width:20px;text-align:center}
.wb-badge{font-size:10px;font-weight:700;margin-left:2px;padding:1px 5px;border-radius:4px;display:none}
.wb-badge.wb-familiar{display:inline;background:#d4f5d4;color:#0a6e0a}
.wb-badge.wb-hard{display:inline;background:#ffe0cc;color:#cc6600}

.btn-row{display:flex;gap:7px;align-items:center}
.btn-row-top{margin-bottom:8px}
.btn{height:40px;border:none;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:transform .16s cubic-bezier(.23,1,.32,1),opacity .12s cubic-bezier(.23,1,.32,1),background-color .16s cubic-bezier(.23,1,.32,1);-webkit-appearance:none;outline:none}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-play{flex:3;background:#007aff;color:#fff}
.btn-play.playing{background:#ff9500}
.btn-play.paused{background:#34c759}
.btn-skip{flex:1.5;background:#f0f0f5;color:#1d1d1f}
.btn-skipword{flex:1.2;background:#f0f0f5;color:#1d1d1f}.btn-group-row{gap:6px;margin-top:8px}.btn-group-row .btn{height:34px;font-size:12px;border-radius:9px}.btn-rewind{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn-prev{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn:disabled{opacity:.35;pointer-events:none}

/* Study mode and recite card: kept in sync with the main vocab card UI */
.study-mode{display:flex;gap:4px;background:#f0f0f5;border-radius:10px;padding:3px;margin:0 0 12px}
.study-mode button{flex:1;border:0;border-radius:8px;background:transparent;color:#6e6e73;padding:8px;font-weight:700;-webkit-appearance:none}
.study-mode button.active{background:#fff;color:#007aff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.vocab-card-shell{min-height:calc(100vh - 150px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 24px}
.vocab-card-progress{font-size:12px;color:#8e8e93;margin-bottom:12px}
.vocab-card-stage{width:100%;display:flex;justify-content:center;perspective:900px}
.vocab-card{width:min(92vw,460px);min-height:430px;background:#fbfdfe;border-radius:28px;padding:26px 22px 22px;box-shadow:0 18px 50px rgba(12,66,84,.12);border:1px solid rgba(92,132,145,.16);touch-action:pan-y;position:relative;overflow:hidden;text-align:left;display:flex;flex-direction:column}
.vocab-card::before,.vocab-card::after{position:absolute;top:18px;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:800;opacity:0;transition:opacity .15s}
.vocab-card::before{content:'熟了';left:18px;background:#e3f8e8;color:#1b8f3a}
.vocab-card::after{content:'不熟';right:18px;background:#fff0df;color:#d86b00}
.vocab-card.swipe-left{border-color:rgba(52,199,89,.35);box-shadow:0 18px 50px rgba(52,199,89,.20)}
.vocab-card.swipe-left::before{opacity:1}
.vocab-card.swipe-right{border-color:rgba(255,149,0,.38);box-shadow:0 18px 50px rgba(255,149,0,.20)}
.vocab-card.swipe-right::after{opacity:1}
.vc-word{font-size:44px;line-height:1.04;font-weight:850;letter-spacing:0;color:#07536a;margin-bottom:10px;overflow-wrap:anywhere}
.vc-cn{font-size:19px;line-height:1.42;font-weight:720;color:#253f4b;margin-bottom:17px}
.vc-sentence-zone{margin-top:2px;padding:15px 15px 13px;border-radius:18px;background:rgba(230,247,249,.72);border:1px solid rgba(255,255,255,.9);box-shadow:0 10px 22px rgba(30,102,119,.06);max-height:220px;overflow:auto}
.vc-sentence-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;color:#057a9d;font-size:10px;font-weight:850;letter-spacing:.04em;text-transform:uppercase}
.vc-example{margin:0;text-align:left;color:#234b59;font-size:14px;line-height:1.55;font-style:normal}
.vc-example+.vc-example{margin-top:11px;padding-top:11px;border-top:1px solid rgba(18,76,91,.12)}
.vc-example-en{font-size:14px;line-height:1.55;font-weight:650;color:#234b59}
.vc-example-cn{margin-top:4px;font-size:12px;line-height:1.45;font-weight:500;color:#6c8790}
.vc-sentence-empty{display:flex;align-items:center;min-height:64px;color:#78919a;font-size:12px;line-height:1.45}
.vc-meta{margin-top:auto;padding-top:15px;font-size:12px;line-height:1.45;color:#7b919b}
.vocab-card-controls{display:flex;justify-content:center;gap:24px;margin-top:28px}
.vc-btn{width:68px;height:68px;border-radius:50%;border:1px solid #dedee3;background:rgba(255,255,255,.72);color:#707074;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;box-shadow:0 3px 10px rgba(0,0,0,.04);-webkit-appearance:none;cursor:pointer}
.vc-btn:active{transform:scale(.96)}
.vc-btn-main{width:78px;height:78px;font-size:26px}
.vc-btn:disabled{opacity:.32}
.recite-rate-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(86vw,420px);margin-top:12px}
.recite-rate-btn{min-height:46px;border:0;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer}
.recite-rate-familiar{background:#e5f7ec;color:#247a44}
.recite-rate-hard{background:#fff1df;color:#a86513}
.recite-rate-btn:active{transform:scale(.98);filter:brightness(.97)}
.vc-hint{margin-top:12px;font-size:12px;color:#b0b0b5;text-align:center}
.archive-review-action{border:0;background:transparent;color:#b36760;font-size:12px;font-weight:650;line-height:1.2;cursor:pointer;padding:6px 4px;border-radius:999px;-webkit-tap-highlight-color:transparent;transition:transform 140ms cubic-bezier(.23,1,.32,1),background-color 140ms ease,color 140ms ease}
.archive-review-action:active{transform:scale(.96);background:rgba(180,92,73,.08)}
.focus-action-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:10px}
.recite-hidden{display:none}
.schedule-feedback{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%);z-index:9999;width:max-content;max-width:calc(100vw - 32px);padding:10px 14px;border-radius:12px;background:rgba(24,52,79,.94);color:#fff;box-shadow:0 10px 28px rgba(16,44,70,.24);font-size:13px;line-height:1.45;text-align:center;pointer-events:none;opacity:0;transition:opacity .18s cubic-bezier(.23,1,.32,1),transform .18s cubic-bezier(.23,1,.32,1)}
.schedule-feedback.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.empty-msg{text-align:center;background:#fff;border-radius:14px;padding:34px 18px;color:#86868b}

button:focus-visible,input:focus-visible{outline:3px solid rgba(5,122,157,.32);outline-offset:2px}
.nav-bar{position:sticky;top:calc(-16px - env(safe-area-inset-top));z-index:60;min-height:58px;margin:-16px -16px 18px;padding:calc(16px + env(safe-area-inset-top)) 16px 10px;background:var(--glass);border-bottom:1px solid var(--glass-line);backdrop-filter:blur(28px) saturate(155%);-webkit-backdrop-filter:blur(28px) saturate(155%)}
.nav-back{color:var(--ocean);font-weight:750}.nav-title{color:var(--ink);font-weight:780}
.unit-btn,.word-group,.vocab-card-shell,.hb-recite-card{background:var(--surface);border-radius:22px;border:1px solid rgba(92,132,145,.12);box-shadow:0 12px 34px rgba(12,66,84,.09)}
.unit-btn{border-radius:18px}.word-group{border-radius:24px}.hb-recite-card{border-radius:28px;touch-action:pan-y;will-change:transform}
.jump-btn,.btn-play,.hb-recite-show{background:var(--deep)}
.word-block{transition:transform .2s var(--ease-out)}
.app-edge-back{position:fixed;left:-18px;top:44%;z-index:9999;width:40px;height:78px;border-radius:0 40px 40px 0;display:grid;place-items:center;background:rgba(230,247,249,.74);color:var(--deep);opacity:0;transform:translateX(-12px);transition:opacity .16s var(--ease-out),transform .16s var(--ease-out);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);pointer-events:none}.app-edge-back.show{opacity:1;transform:none}.app-edge-back span{margin-left:12px;font-size:27px}
@media(prefers-reduced-motion:reduce){.unit-btn,.btn,.word-block,.app-edge-back,.hb-recite-card{transition:opacity .16s ease!important;transform:none!important}}
@media(prefers-reduced-transparency:reduce){.nav-bar,.app-edge-back{background:#f7fbfc;backdrop-filter:none;-webkit-backdrop-filter:none}}
@media(prefers-contrast:more){.nav-bar,.unit-btn,.word-group,.hb-recite-card{border-color:#31515e}}
</style>

  var start = u * UNIT_SIZE;

}

  var ws = wordsInUnit(curUnit);
  var start = g * GROUP_SIZE;
  return ws.slice(start, Math.min(start + GROUP_SIZE, ws.length));

function renderUnits() {
  var p = prefs(), h = '';
  for (var u = 0; u < UNIT_COUNT; u++) {
    var ws = wordsInUnit(u), marked = 0, fam = 0;
    for (var w = 0; w < ws.length; w++) {
      var k = ws[w].en;
      if (p[k] === 'familiar') { marked++; fam++; }
      else if (p[k]) marked++;
    }
    var pct = Math.round(marked / ws.length * 100);
    h += '<button class="unit-btn' + (pct>0?' has-progress':'') + '" onclick="openUnit(' + u + ')">';
    h += 'U' + (u+1);
    h += '<span class="u-label">' + ws.length + '词' + (fam>0?' · '+fam+'熟':'') + '</span>';
    if (pct > 0) h += '<div class="unit-progress"><div class="unit-progress-bar" style="width:' + pct + '%"></div></div>';
    h += '</button>';
  }
  $('unitGrid').innerHTML = h;
}

// ── Audio: unit-level JSON bundles (base64 → blob URL) ──

        preloaded[globalW + '_en'] = b64toBlob(data.words[w].en);
        preloaded[globalW + '_cn'] = b64toBlob(data.words[w].cn);

    })
    .catch(function() {

// ── Playback (AB direct swap) ──
function getAu(slot) {

function loadAu(slot, url) {

  if (prev !== url) { au.src = url; if (slot === 0) auUrlA = url; else auUrlB = url; }
}

function getWordLabels(w) {
  var pf = prefs()[wordKey(curUnit, curGroup, w)];
  if (pf === 'familiar') return {labels: ['英①','中①'], isENs: [true, false]};
  if (pf === 'hard') return {labels: ['英①','英②','中①','中②','英③','中③','英④','中④','英⑤','中⑤','英⑥','中⑥'], isENs: [true,true,false,false,true,false,true,false,true,false,true,false]};

function segUrl(w, ns) {

function onSegEnd() {

    cnts[wordKey(curUnit, curGroup, wIdx)] = (cnts[wordKey(curUnit, curGroup, wIdx)] || 0) + 1;
    saveCounts(cnts);

  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  au.onerror = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var url = segUrl(nx.wIdx, nx.step);
    if (url) loadAu(1 - curSlot, url);
  }

function playWord() {

      playWord();

  }

  loadAu(curSlot, url);
  var au = getAu(curSlot);
  curAudio = au;
  au.playbackRate = 1.0;
  hl(curGroup, wIdx);

  if (step === 0) {
    var cnts = loadCounts();
    var kk = wordKey(curUnit, curGroup, wIdx);
    cnts[kk] = (cnts[kk] || 0) + 1;
    saveCounts(cnts);

  }

  var segDone = false;
  function next() { if (!segDone) { segDone = true; onSegEnd(); } }
  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();

    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  };
  var playP = au.play();
  if (playP !== undefined) { playP.catch(function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    next();
  }); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var nu = segUrl(nx.wIdx, nx.step);
    if (nu) loadAu(1 - curSlot, nu);
  }
}

  if (wsBtn) {
    setPref(parseInt(wsBtn.dataset.g), parseInt(wsBtn.dataset.w), wsBtn.dataset.act);
    return;
  }
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
function restoreHbResume() {
  if (location.search.indexOf('resume=1') < 0) return false;
  var r; try { r = JSON.parse(localStorage.getItem('learning_resume_v1') || '{}'); } catch(e) { return false; }
  if (!r || r.source !== 'hongbaoshu' || !Number.isFinite(r.unitIdx) || r.unitIdx < 0 || r.unitIdx >= UNIT_COUNT) return false;
  hbStudyMode = r.mode === 'recite' ? 'recite' : 'listen';
  openUnit(r.unitIdx);
  if (hbStudyMode === 'recite') { hbReciteIdx = Math.max(0, Number(r.itemIdx) || 0); hbReciteDone = false; renderGroups(); }
  return true;
}
function restoreHbRoute() {
  var q; try { q = new URLSearchParams(location.search || ''); } catch(e) { return false; }
  if (!q.has('unit')) return false;
  var unit = Number(q.get('unit')), item = Number(q.get('item'));
  if (!Number.isFinite(unit) || unit < 0 || unit >= UNIT_COUNT) return false;
  hbStudyMode = q.get('mode') === 'recite' ? 'recite' : 'listen';
  openUnit(unit);
  if (hbStudyMode === 'recite') {
    hbReciteIdx = Number.isFinite(item) ? Math.max(0, item) : 0;
    hbReciteDone = false; renderGroups();
  }
  return true;
}
if (!restoreHbRoute() && !restoreHbResume()) renderUnits();
function initHbNavigation() {
  if (!history || !history.replaceState) return;
  var initial = hbActiveView, unit = curUnit;
  history.replaceState({hbView:'units',hbDepth:0},'',location.href); hbNavReady = true; hbDepth = 0;
  if (initial !== 'units') { hbDepth = 1; history.pushState({hbView:initial,hbDepth:1,unit:unit},'',location.href); }
  addEventListener('popstate',function(e){
    var s=e.state||{hbView:'units',hbDepth:0}; hbRestoring=true; hbDepth=Number(s.hbDepth)||0; stop();
    if(s.hbView==='groups'&&Number.isFinite(Number(s.unit))){curUnit=Number(s.unit);showView('groups',{fromHistory:true});renderGroups();}
    else{curUnit=-1;curGroup=-1;showView('units',{fromHistory:true});renderUnits();}
    hbRestoring=false;
  });
  WordsMotion.installEdgeBack({edge:22,indicator:$('appEdgeBack'),canGoBack:function(){return hbDepth>0},getSurface:function(){return $('view-'+hbActiveView)},onBack:function(){history.back()}});
}
initHbNavigation();
</script>
