    var startB = batch * BATCH, end = Math.min(startB + BATCH, n);
    if (startB >= n) return;

  for (var i = 0; i < items.length; i++) {
    var e = null;
    for (var j = 0; j < ENTRIES.length; j++) { if (ENTRIES[j].id === items[i].id) { e = ENTRIES[j]; break; } }
    var label = e ? esc(e.label) : '(已移除的词单)';
    var meta = e ? e.words.length+'词' : '';
    h += '<div class="recycle-item"><div class="recycle-item-info"><div class="recycle-item-label">'+label+'</div><div class="recycle-item-meta">'+meta+'</div></div><button class="recycle-restore" onclick="restoreEntry(\''+esc(items[i].id)+'\')">恢复</button></div>';
  }
  $('recycleList').innerHTML = h;
}
function restoreEntry(id) {
  var del = getDeletedRaw().filter(function(x) {
    return (typeof x === 'string' ? x : x.id) !== id;
  });
  saveDeleted(del);
  renderRecycle();
  renderHome();
}
function clearRecycle() {
  if (!confirm('确认清空回收站？\n清空后将无法恢复')) return;
  if (!confirm('再次确认：清空后不可撤销')) return;
  saveDeleted([]);
  renderRecycle();
  renderHome();
}

// ── Word list ──
function renderWords(e) {
  var p=prefs(), h='', fam=0;
  for (var w=0; w<e.words.length; w++) {
    var word=e.words[w], pref=p[e.id+'_'+w];
    if (pref==='familiar') fam++;
    h += '<div class="word-swipe" id="ws'+w+'"><div class="ws-actions"><button class="ws-btn ws-familiar" data-w="'+w+'" data-act="familiar">熟</button><button class="ws-btn ws-hard" data-w="'+w+'" data-act="hard">难</button><button class="ws-btn ws-reset" data-w="'+w+'" data-act="reset">恢复</button></div><div class="word-block" id="wb'+w+'"><div class="wb-en">'+esc(word.en)+'</div><div class="wb-cn">'+esc(word.cn)+'</div><div class="wb-step"></div><div class="wb-badge"></div></div></div>';
  }
  $('wordList').innerHTML = h;
  $('groupStat').textContent = e.words.length+'词 · '+fam+'熟';
  updateBadges();
}

function updateBadges() {
  var e = getE(); if (!e) return;
  var p = prefs();
  for (var w=0; w<e.words.length; w++) {
    var pref = p[e.id+'_'+w];
    var badge = document.querySelector('#wb'+w+' .wb-badge');
    if (!badge) continue;
    badge.className='wb-badge'; badge.textContent='';
    if (pref==='familiar') { badge.classList.add('wb-familiar'); badge.textContent='熟'; }
    else if (pref==='hard') { badge.classList.add('wb-hard'); badge.textContent='难'; }
  }
}

function hl(w) {
  document.querySelectorAll('#wordList .word-block.active').forEach(function(el){el.classList.remove('active')});
  var wb = $('wb'+w);
  if (wb) {
    wb.classList.add('active');
    var labels = getWordLabels(prefs(), entryId, w).labels;
    wb.querySelector('.wb-step').textContent = labels[step]||'';
  }
}

function clearHl() {
  document.querySelectorAll('#wordList .word-block.active').forEach(function(el){el.classList.remove('active')});
}

// ── Buttons ──
function setBtns(playing, isPaused, loading) {
  var playIcon = '<path d="M8 5v14l11-7z"/>';
  var pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  var isLoading = !!loading;
  ['btnPlay','btnPlayTop'].forEach(function(id) {
    var b = $(id); if (!b) return;
    var icon = b.querySelector('.play-icon'), label = b.querySelector('.btn-label');
    b.disabled = isLoading;
    b.classList.remove('playing','paused');
    if (isLoading) { icon.innerHTML = playIcon; label.textContent = '加载中…'; return; }
    if (playing) { b.classList.add('playing'); icon.innerHTML = pauseIcon; label.textContent = '播放中'; }
    else if (isPaused) { b.classList.add('paused'); icon.innerHTML = playIcon; label.textContent = '继续'; }
    else { icon.innerHTML = playIcon; label.textContent = '朗读'; }
  });
  var aux = (playing || isPaused) && !isLoading;
  ['btnSkip','btnSkipTop'].forEach(function(id) {
    var b = $(id); if (b) b.disabled = !aux;
  });
}
function refreshBtns() {
  if (curAudio && !curAudio.ended && !curAudio.paused) setBtns(true, false, false);
  else if (paused) setBtns(false, true, false);
  else setBtns(false, false, false);
}

function done() {
  stop(); clearHl(); setBtns(false,false,false);
  wIdx=0; step=0; paused=false; single=false;
}

function getWordLabels(p, eid, widx) {
  var pf = p[eid + '_' + widx];
  if (pf === 'familiar') return {labels: makeLabels(1), isENs: makeIsENs(1)};
  if (pf === 'hard') return {labels: makeLabels(3), isENs: makeIsENs(3)};
  return {labels: makeLabels(2), isENs: makeIsENs(2)};
}

// ── Playback (AB direct swap — no setTimeout, A ends → B plays instantly) ──

function getAu(slot) {
  if (slot === 0) { if (!auA) auA = new Audio(); return auA; }
  if (!auB) auB = new Audio(); return auB;
}
function loadAu(slot, url) {
  var au = getAu(slot);
  var prev = slot === 0 ? auUrlA : auUrlB;
  if (prev !== url) { au.src = url; if (slot === 0) auUrlA = url; else auUrlB = url; }
}
function segUrlFor(ns, nw) {
  var e = getE(); if (!e) return null;
  var info = getWordLabels(prefs(), e.id, nw);
  if (ns >= info.labels.length) return null;
  var isEN = info.isENs[ns];
  var lang = isEN ? 'en' : 'cn';
  var k = e.id + '_' + nw + '_' + lang;
  return preloaded[k] || mp3(e.id, nw, lang);
}
function nextStepAfter(ns, nw) {
  // returns {step, wIdx} for the next segment, or null if done
  var e = getE(); if (!e) return null;
  var info = getWordLabels(prefs(), e.id, nw);
  if (ns + 1 < info.labels.length) return {step: ns + 1, wIdx: nw};
  if (single) return null;
  if (nw + 1 < e.words.length) return {step: 0, wIdx: nw + 1};
  return null;
}

function onSegEnd() {
  var au = getAu(1 - curSlot);
  curSlot = 1 - curSlot;
  curAudio = au;
  au.playbackRate = 1.0;
  hl(wIdx);

  var segDone = false;
  function onErr() {
    if (segDone) return;
    segDone = true;
    // Kill the failing Audio so it doesn't revive later
    au.onended = null; au.onerror = null;
    au.pause(); au.removeAttribute('src');
    if (curSlot === 0) auUrlA = null; else auUrlB = null;
    // Advance and restart fresh
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    playWord();
  }

  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    if (!segDone) { segDone = true; onSegEnd(); }
  };
  au.onerror = onErr;
  var playP = au.play();
  if (playP !== undefined) { playP.catch(onErr); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var url = segUrlFor(nx.step, nx.wIdx);
    if (url) loadAu(1 - curSlot, url);
  }
}

function playWord() {
  var e = getE();
  if (!e || wIdx >= e.words.length) { done(); return; }

  var url = segUrlFor(step, wIdx);
  if (!url) { done(); return; }

  loadAu(curSlot, url);
  var au = getAu(curSlot);
  curAudio = au;
  au.playbackRate = 1.0;
  hl(wIdx);

  var segDone = false;
  function onErr() {
    if (segDone) return;
    segDone = true;
    // Kill the failing Audio so it doesn't revive later
    au.onended = null; au.onerror = null;
    au.pause(); au.removeAttribute('src');
    if (curSlot === 0) auUrlA = null; else auUrlB = null;
    // Advance and restart fresh
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    playWord();
  }

  au.onended = function() {
    var nx = nextStepAfter(step, wIdx);
    if (!nx) { done(); return; }
    step = nx.step; wIdx = nx.wIdx;
    if (!segDone) { segDone = true; onSegEnd(); }
  };
  au.onerror = onErr;
  var playP = au.play();
  if (playP !== undefined) { playP.catch(onErr); }

  var nx = nextStepAfter(step, wIdx);
  if (nx) {
    var nu = segUrlFor(nx.step, nx.wIdx);
    if (nu) loadAu(1 - curSlot, nu);
  }
}

function togglePlay() {
  if (curAudio && !curAudio.ended && !curAudio.paused) {
    curAudio.pause();
    paused = true;
    setBtns(false, true, false);
  } else if (paused && curAudio) {
    curAudio.play();
    paused = false;
    setBtns(true, false, false);
  } else {
    stop();
    wIdx = 0; step = 0; paused = false; single = false;
    setBtns(true, false, false);
    playWord();
  }
}

function doRewind() { stop(); wIdx=0; step=0; paused=false; setBtns(false,false,false); }

function skipWord() {
  stop(); step=0; wIdx++; paused=false; single=false;
  var e = getE();
  if (!e || wIdx>=e.words.length) { done(); return; }
  setBtns(true, false, false);
  playWord();
}

function playSingleW(w) {
  stop(); wIdx=w; step=0; paused=false; single=true;
  setBtns(true, false, false);
  playWord();
}

// ── Prefs ──
function setPref(w, act) {
  var key=entryId+'_'+w, p=prefs();
  if (act==='reset') delete p[key]; else p[key]=act;
  saveP(p); updateBadges();
  var e=getE();
  if (e) {
    var fam=0;
    for (var i=0; i<e.words.length; i++) if (p[e.id+'_'+i]==='familiar') fam++;
    $('groupStat').textContent = e.words.length+'词 · '+fam+'熟';
  }
  var el=$('ws'+w); if (el) setTimeout(function(){closeSw(el)},200);
}

// ── Swipe (word + entry) ──
var swOpen=null, swCur=null, swX=0, swY=0, swTX=0, wasSw=false, swW=0, swBlk=null, swType="";
function closeSw(el) {
  if (!el) el=swOpen;
  if (el) {
    var b=el.querySelector('.word-block, .entry-item');
    if(b) b.style.transform='translateX(0)';
    el.classList.remove('swiped');
  }
  if (swOpen===el||!el) swOpen=null;
}

document.addEventListener('touchstart',function(e){
  wasSw=false;
  var sw = e.target.closest('.word-swipe') || e.target.closest('.entry-swipe');
  if (!sw) { closeSw(); swCur=null; swBlk=null; return; }
  if (swOpen && swOpen!==sw) closeSw(swOpen);
  swCur = sw;
  swType = sw.classList.contains('entry-swipe') ? 'entry' : 'word';
  swBlk = swType === 'entry' ? sw.querySelector('.entry-item') : sw.querySelector('.word-block');
  swW = swType === 'entry' ? 80 : 150;
  swX = e.touches[0].clientX; swY = e.touches[0].clientY;
  swTX = 0;
  if (swBlk) { var m=swBlk.style.transform.match(/-?[0-9.]+/); if(m) swTX=parseFloat(m[0]); }
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!swCur)return;
  var dx=e.touches[0].clientX-swX, dy=e.touches[0].clientY-swY;
  if(Math.abs(dy)>Math.abs(dx)){closeSw(swCur);return}
  if(Math.abs(dx)>10) wasSw=true;
  if(dx>10){closeSw(swCur);return}
  e.preventDefault();
  var tx=Math.max(-swW,Math.min(0,swTX+dx));
  if(swBlk){swBlk.style.transition='none';swBlk.style.transform='translateX('+tx+'px)'}
},{passive:false});
document.addEventListener('touchend',function(){
  if(!swCur || !swBlk){swCur=null;swBlk=null;return}
  swBlk.style.transition='transform .25s ease';
  var m=swBlk.style.transform.match(/-?[0-9.]+/), tx=m?parseFloat(m[0]):0;
  if(Math.abs(tx)>swW*.35){swBlk.style.transform='translateX(-'+swW+'px)';swCur.classList.add('swiped');swOpen=swCur}
  else{swBlk.style.transform='translateX(0)';swCur.classList.remove('swiped');swOpen=null}
  swCur=null; swBlk=null; swType="";
});
document.addEventListener('click',function(e){
  // Close swipe if tapping outside
  if (!e.target.closest('.word-swipe') && !e.target.closest('.entry-swipe')) closeSw();
  var wsBtn = e.target.closest('.ws-btn');
  if (wsBtn) { setPref(parseInt(wsBtn.dataset.w), wsBtn.dataset.act); return; }
  var esBtn = e.target.closest('.es-btn');
  if (esBtn) { var ei=parseInt(esBtn.dataset.idx); if (esBtn.dataset.act==='pin') doPin(ei); else doDel(ei); return; }
  if (!wasSw) {
    var wb = e.target.closest('.word-block');
    if (wb) {
      var swEl = wb.closest('.word-swipe');
      if (swEl && swEl.classList.contains('swiped')) { closeSw(swEl); }
      else { var m=wb.id.match(/wb(\d+)/); if(m) playSingleW(parseInt(m[1])); }
    }
  }
  wasSw = false;
});

// ── Entry actions ──
function entryAction(id, act) {
  var label = '此操作';
  if (act === 'delete') {
    if (!confirm('确认删除此词单？\n可在回收站中恢复')) return;
    var del = getDeletedRaw();
    if (getDeletedIds().indexOf(id) < 0) del.push({id: id, deletedAt: Date.now()});
    saveDeleted(del);
    var pin = getPinnedIds().filter(function(x) { return x !== id; });
    savePinned(pin);
  } else if (act === 'pin') {
    if (!confirm('确认置顶此词单？')) return;
    var pin = getPinnedIds().filter(function(x) { return x !== id; });
    pin.unshift(id);
    savePinned(pin);
  }
  closeSw();
  renderHome();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

renderHome();
</script>
