<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAOYAN WORDBANK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;padding:16px 16px 40px;-webkit-tap-highlight-color:transparent;user-select:none}

.home-hero{text-align:center;margin:28px 0 4px;font-size:24px;font-weight:800}
.home-sub{text-align:center;color:#86868b;font-size:12px;margin-bottom:24px}
.entry-list{display:flex;flex-direction:column;gap:8px}
.entry-item{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:transform .1s}
.entry-item:active{transform:scale(.98)}
.entry-item-info{flex:1}
.entry-item-label{font-size:16px;font-weight:500}
.entry-item-meta{font-size:12px;color:#86868b}
.empty-msg{text-align:center;color:#86868b;padding:40px;font-size:14px}

.nav-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nav-back{background:none;border:none;color:#007aff;font-size:16px;cursor:pointer;padding:6px 0}
.nav-title{font-size:17px;font-weight:600}

.word-group{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.group-label{font-size:15px;font-weight:600}
.group-stat{font-size:12px;color:#86868b}
.word-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.word-swipe{position:relative;overflow:hidden;border-radius:10px}
.ws-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.ws-btn{min-width:50px;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:0 10px;-webkit-appearance:none;outline:none}
.ws-btn:active{filter:brightness(.85)}
.ws-familiar{background:#34c759}
.ws-hard{background:#ff9500}
.ws-reset{background:#8e8e93}
.word-block{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#f9f9fb;transition:transform .25s ease,background .2s;position:relative;z-index:1}
.word-block.active{background:#d4f5d4}
.wb-en{font-weight:700;font-size:16px;color:#1d1d1f;flex:1}
.word-block.active .wb-en{color:#0a6e0a}
.wb-cn{font-size:14px;color:#86868b;flex:2}
.word-block.active .wb-cn{color:#2d7d2d}
.wb-step{font-size:11px;color:#bbb;white-space:nowrap;display:none}
.word-block.active .wb-step{display:inline}
.wb-badge{font-size:10px;font-weight:700;margin-left:2px;padding:1px 5px;border-radius:4px;display:none}
.wb-badge.wb-familiar{display:inline;background:#d4f5d4;color:#0a6e0a}
.wb-badge.wb-hard{display:inline;background:#ffe0cc;color:#cc6600}

.btn-row{display:flex;gap:7px;align-items:center}
.btn-row-top{margin-bottom:8px}
.btn{height:40px;border:none;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s;-webkit-appearance:none;outline:none}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-play{flex:3;background:#007aff;color:#fff}
.btn-play.playing{background:#ff9500}
.btn-play.paused{background:#34c759}
.btn-pause{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn-skip{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn-rewind{flex:1;background:#f0f0f5;color:#1d1d1f}
.btn svg{width:17px;height:17px;pointer-events:none}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-label{white-space:nowrap}
</style>
</head>
<body>

<div id="view-home">
  <div class="home-hero">WORD BANK</div>
  <div class="home-sub">2026-06-24 15:14</div>
  <div class="entry-list" id="entryList"></div>
  <div class="empty-msg" id="homeEmpty" style="display:none">暂无词单</div>
</div>

<div id="view-group" style="display:none">
  <div class="nav-bar">
    <button class="nav-back" onclick="showHome()">← 返回</button>
    <span class="nav-title" id="groupTitle"></span>
  </div>
  <div class="word-group">
    <div class="group-header">
      <span class="group-label" id="groupLabel"></span>
      <span class="group-stat" id="groupStat"></span>
    </div>
    <div class="btn-row btn-row-top" id="btnRowTop">
      <button class="btn btn-play" id="btnPlayTop" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" fill="currentColor" class="play-icon"><path d="M8 5v14l11-7z"/></svg>
        <span class="btn-label">朗读</span>
      </button>
      <button class="btn btn-pause" id="btnPauseTop" onclick="togglePause()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn btn-skip" id="btnSkipTop" onclick="skipWord()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18l-8.5-6L16 6v12zM8 6v12H6V6h2z"/></svg>
      </button>
      <button class="btn btn-rewind" onclick="doRewind()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
      </button>
    </div>
    <div class="word-list" id="wordList"></div>
    <div class="btn-row" id="btnRowBot">
      <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" fill="currentColor" class="play-icon"><path d="M8 5v14l11-7z"/></svg>
        <span class="btn-label">朗读</span>
      </button>
      <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn btn-skip" id="btnSkip" onclick="skipWord()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18l-8.5-6L16 6v12zM8 6v12H6V6h2z"/></svg>
      </button>
      <button class="btn btn-rewind" onclick="doRewind()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var ENTRIES = [{"id": "wb_2026-06-23_demo", "label": "6.23单词", "date": "2026-06-23", "words": [{"en": "noteworthy", "cn": "值得注意的；显著的"}, {"en": "quirk", "cn": "怪事，奇特之处；怪癖"}, {"en": "elite", "cn": "精英的；杰出的"}, {"en": "account for", "cn": "解释；说明…的原因"}, {"en": "pronounced", "cn": "明显的，显著的"}, {"en": "astrological", "cn": "占星的；占星学的"}, {"en": "confer", "cn": "赋予；授予"}, {"en": "stamina", "cn": "耐力，持久力"}, {"en": "conceive", "cn": "受孕；构思，设想"}, {"en": "random", "cn": "随机的；随意的"}, {"en": "digit span", "cn": "数字记忆广度"}, {"en": "cognitive", "cn": "认知的"}, {"en": "intuitive", "cn": "直觉的"}, {"en": "exhibit", "cn": "展现，表现；展出"}, {"en": "swamped", "cn": "被淹没；掩盖，压倒"}, {"en": "encodes", "cn": "编码；解读信息"}, {"en": "deliberate practice", "cn": "刻意练习"}, {"en": "entails", "cn": "需要；包含；意味着"}, {"en": "pursuits", "cn": "追求；事业，领域"}, {"en": "achievers", "cn": "成功者，成绩优异者"}, {"en": "overrated", "cn": "被高估的，评价过高的"}, {"en": "confine", "cn": "限制；禁闭；边界"}, {"en": "confirm", "cn": "确认；证实"}, {"en": "conflict", "cn": "冲突；矛盾；斗争"}, {"en": "configuration", "cn": "配置；构造；布局"}, {"en": "trait", "cn": "特征；特质"}, {"en": "violence", "cn": "暴力；猛烈"}, {"en": "violent", "cn": "暴力的；猛烈的"}, {"en": "virtual", "cn": "虚拟的；实际上的"}, {"en": "appliance", "cn": "家用电器；器具"}, {"en": "discriminate", "cn": "歧视；区分"}, {"en": "estimate", "cn": "估计；估算；估价"}, {"en": "ethnic", "cn": "种族的；民族的"}, {"en": "miserable", "cn": "痛苦的；悲惨的；糟糕的"}, {"en": "misery", "cn": "痛苦；苦难；悲惨"}, {"en": "negotiate", "cn": "谈判；协商；顺利通过"}, {"en": "outline", "cn": "轮廓；大纲；概述"}, {"en": "outlook", "cn": "前景；观点；展望"}, {"en": "practitioner", "cn": "从业者；执业医师"}, {"en": "preach", "cn": "宣扬；布道；说教"}, {"en": "precede", "cn": "在…之前；领先"}, {"en": "precise", "cn": "精确的；准确的"}, {"en": "precaution", "cn": "预防；防备；预防措施"}, {"en": "precedent", "cn": "先例；惯例"}, {"en": "preceding", "cn": "先前的；在前的"}, {"en": "precision", "cn": "精确；精度"}, {"en": "stretch", "cn": "伸展；延伸；一段距离/时间"}]}];
var AUDIO_OK = ["wb_2026-06-23_demo"];
var TS = 1782285269;

var entryId = null, wIdx = 0, step = 0, paused = false, single = false;
var curAudio = null, nextAudio = null;
var P = [true, false, true, false];  // STEP_IS_EN
var PF = [true, false];  // FAM version

function prefs() {
  try { return JSON.parse(localStorage.getItem('wb_prefs')||'{}'); } catch(e) { return {}; }
}
function saveP(obj) { localStorage.setItem('wb_prefs', JSON.stringify(obj)); }
function getE() {
  for (var i=0; i<ENTRIES.length; i++) if (ENTRIES[i].id===entryId) return ENTRIES[i];
  return null;
}

function $(id) { return document.getElementById(id); }
function showView(v) {
  $('view-home').style.display = v==='home'?'block':'none';
  $('view-group').style.display = v==='group'?'block':'none';
}
function stop() {
  if (curAudio) { curAudio.onended=null; curAudio.onerror=null; curAudio.pause(); curAudio=null; }
  if (nextAudio) { nextAudio.onended=null; nextAudio.onerror=null; nextAudio.pause(); nextAudio=null; }
}
function showHome() { stop(); showView('home'); renderHome(); }

function showGroup(id) {
  stop(); entryId = id;
  var e = getE(); if (!e) { showHome(); return; }
  showView('group');
  $('groupTitle').textContent = e.label;
  $('groupLabel').textContent = e.label;
  renderWords(e);
  // Preload ALL audio for this group
  preloaded = {};
  preloadRange(id, 0, e.words.length);
}

// ── mp3 URL ──
function mp3(eid, w, lang) {
  return 'audio/' + eid + '_' + w + '_' + lang + '.mp3?v=' + TS;
}

// ── Preload ──
var preloaded = {};  // eid_w_lang -> Audio element
function preloadRange(eid, from, to) {
  for (var w = from; w < to; w++) {
    ['en','cn'].forEach(function(l) {
      var k = eid + '_' + w + '_' + l;
      if (preloaded[k]) return;
      var a = new Audio();
      a.preload = 'auto';
      a.src = mp3(eid, w, l);
      a.load();
      preloaded[k] = a;
    });
  }
}

// ── Home ──
function renderHome() {
  if (ENTRIES.length===0) {
    $('entryList').innerHTML=''; $('homeEmpty').style.display='block';
  } else {
    $('homeEmpty').style.display='none';
    var h='', p=prefs();
    for (var i=0; i<ENTRIES.length; i++) {
      var e = ENTRIES[i], fam=0;
      for (var w=0; w<e.words.length; w++) if (p[e.id+'_'+w]==='familiar') fam++;
      h += '<div class="entry-item" onclick="showGroup(\''+e.id+'\')"><div class="entry-item-info"><div class="entry-item-label">'+esc(e.label)+'</div><div class="entry-item-meta">'+e.words.length+'词'+(fam>0?' · '+fam+'熟':'')+'</div></div></div>';
    }
    $('entryList').innerHTML = h;
  }
}

// ── Word list ──
function renderWords(e) {
  var p=prefs(), h='', fam=0;
  for (var w=0; w<e.words.length; w++) {
    var word=e.words[w], pref=p[e.id+'_'+w];
    if (pref==='familiar') fam++;
    h += '<div class="word-swipe" id="ws'+w+'"><div class="ws-actions"><button class="ws-btn ws-familiar" data-w="'+w+'" data-act="familiar">熟</button><button class="ws-btn ws-hard" data-w="'+w+'" data-act="hard">难</button><button class="ws-btn ws-reset" data-w="'+w+'" data-act="reset">恢复</button></div><div class="word-block" id="wb'+w+'"><div class="wb-en">'+esc(word.en)+'</div><div class="wb-cn">'+esc(word.cn)+'</div><div class="wb-step"></div><div class="wb-badge"></div></div></div>';
  }
  $('wordList').innerHTML = h;
  $('groupStat').textContent = e.words.length+'词 · '+fam+'熟';
  updateBadges();
}

function updateBadges() {
  var e = getE(); if (!e) return;
  var p = prefs();
  for (var w=0; w<e.words.length; w++) {
    var pref = p[e.id+'_'+w];
    var badge = document.querySelector('#wb'+w+' .wb-badge');
    if (!badge) continue;
    badge.className='wb-badge'; badge.textContent='';
    if (pref==='familiar') { badge.classList.add('wb-familiar'); badge.textContent='熟'; }
    else if (pref==='hard') { badge.classList.add('wb-hard'); badge.textContent='难'; }
  }
}

function hl(w) {
  document.querySelectorAll('#wordList .word-block.active').forEach(function(el){el.classList.remove('active')});
  var wb = $('wb'+w);
  if (wb) {
    wb.classList.add('active');
    var pf = prefs()[entryId+'_'+w];
    var labels = pf==='familiar' ? ['英①','中①'] : ['英①','中①','英②','中②'];
    wb.querySelector('.wb-step').textContent = labels[step]||'';
  }
}

function clearHl() {
  document.querySelectorAll('#wordList .word-block.active').forEach(function(el){el.classList.remove('active')});
}

// ── Buttons ──
function setBtns(playing, isPaused, loading) {
  ['btnPlay','btnPlayTop'].forEach(function(id) {
    var b = $(id); if (!b) return;
    var icon = b.querySelector('.play-icon'), label = b.querySelector('.btn-label');
    b.disabled = !!loading;
    b.classList.remove('playing','paused');
    if (loading) { icon.innerHTML='<path d="M8 5v14l11-7z"/>'; label.textContent='加载'; return; }
    if (playing) { b.classList.add('playing'); icon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; label.textContent='播放中'; }
    else if (isPaused) { b.classList.add('paused'); icon.innerHTML='<path d="M8 5v14l11-7z"/>'; label.textContent='继续'; }
    else { icon.innerHTML='<path d="M8 5v14l11-7z"/>'; label.textContent='朗读'; }
  });
  var aux = (playing||isPaused) && !loading;
  ['btnPause','btnPauseTop','btnSkip','btnSkipTop'].forEach(function(id) {
    var b = $(id); if (b) b.disabled = !aux;
  });
}

function done() {
  stop(); clearHl(); setBtns(false,false,false);
  wIdx=0; step=0; paused=false; single=false;
}

// ── Playback ──
function playWord() {
  var e = getE();
  if (!e || wIdx>=e.words.length) { done(); return; }

  var p = prefs(), pf = p[e.id+'_'+wIdx];
  var labels = pf==='familiar' ? ['英①','中①'] : ['英①','中①','英②','中②'];
  var isENs = pf==='familiar' ? PF : P;

  if (step >= labels.length) {
    if (single) { done(); return; }
    step = 0; wIdx++;
    if (wIdx >= e.words.length) { done(); return; }
    pf = p[e.id+'_'+wIdx];
    labels = pf==='familiar'?['英①','中①']:['英①','中①','英②','中②'];
    isENs = pf==='familiar'?PF:P;
  }

  var isEN = isENs[step];
  var lang = isEN ? 'en' : 'cn';
  var k = e.id + '_' + wIdx + '_' + lang;
  // Use preloaded audio (instant from cache) or fallback to URL
  var au = preloaded[k] ? new Audio(preloaded[k].src) : new Audio(mp3(e.id, wIdx, lang));
  curAudio = au;
  hl(wIdx);

  au.onended = next;
  au.onerror = next;
  au.play();

  function next() {
    step++;
    if (step>=labels.length) { if(single){done();return;} step=0; wIdx++; }
    if (wIdx>=e.words.length) { done(); }
    else { playWord(); }
  }
}

function togglePlay() {
  if (wIdx>0 && !paused && !single) {
    if (curAudio) curAudio.pause();
    paused=true; setBtns(false,true,false);
  } else if (paused) {
    if (curAudio) curAudio.play();
    paused=false; setBtns(true,false,false);
  } else {
    stop(); wIdx=0; step=0; paused=false; single=false;
    setBtns(true,false,false); playWord();
  }
}

function togglePause() {
  if (paused) { if (curAudio) curAudio.play(); paused=false; setBtns(true,false,false); }
  else { if (curAudio) curAudio.pause(); paused=true; setBtns(false,true,false); }
}

function doRewind() { stop(); wIdx=0; step=0; paused=false; setBtns(false,false,false); }

function skipWord() {
  stop(); step=0; wIdx++; paused=false; single=false;
  var e = getE();
  if (!e || wIdx>=e.words.length) { done(); return; }
  setBtns(true,false,false); playWord();
}

function playSingleW(w) {
  stop(); wIdx=w; step=0; paused=false; single=true;
  setBtns(true,false,false); playWord();
}

// ── Prefs ──
function setPref(w, act) {
  var key=entryId+'_'+w, p=prefs();
  if (act==='reset') delete p[key]; else p[key]=act;
  saveP(p); updateBadges();
  var e=getE();
  if (e) {
    var fam=0;
    for (var i=0; i<e.words.length; i++) if (p[e.id+'_'+i]==='familiar') fam++;
    $('groupStat').textContent = e.words.length+'词 · '+fam+'熟';
  }
  var el=$('ws'+w); if (el) setTimeout(function(){closeSw(el)},200);
}

// ── Swipe ──
var swOpen=null, swCur=null, swX=0, swY=0, swTX=0, wasSw=false, SW_W=150;
function closeSw(el) {
  if (!el) el=swOpen;
  if (el) { var wb=el.querySelector('.word-block'); if(wb)wb.style.transform='translateX(0)'; el.classList.remove('swiped'); }
  if (swOpen===el||!el) swOpen=null;
}
document.addEventListener('touchstart',function(e){
  wasSw=false;
  var sw=e.target.closest('.word-swipe');
  if (!sw){closeSw();swCur=null;return;}
  if (swOpen&&swOpen!==sw)closeSw(swOpen);
  swCur=sw; swX=e.touches[0].clientX; swY=e.touches[0].clientY;
  var wb=sw.querySelector('.word-block'); swTX=0;
  if(wb){var m=wb.style.transform.match(/-?[0-9.]+/); if(m)swTX=parseFloat(m[0])}
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!swCur)return;
  var dx=e.touches[0].clientX-swX, dy=e.touches[0].clientY-swY;
  if(Math.abs(dy)>Math.abs(dx)){closeSw(swCur);return}
  if(Math.abs(dx)>10)wasSw=true;
  if(dx>10){closeSw(swCur);return}
  e.preventDefault();
  var tx=Math.max(-SW_W,Math.min(0,swTX+dx));
  var wb=swCur.querySelector('.word-block');
  if(wb){wb.style.transition='none';wb.style.transform='translateX('+tx+'px)'}
},{passive:false});
document.addEventListener('touchend',function(){
  if(!swCur)return;
  var wb=swCur.querySelector('.word-block');
  if(!wb){swCur=null;return}
  wb.style.transition='transform .25s ease';
  var m=wb.style.transform.match(/-?[0-9.]+/), tx=m?parseFloat(m[0]):0;
  if(Math.abs(tx)>SW_W*.35){wb.style.transform='translateX(-'+SW_W+'px)';swCur.classList.add('swiped');swOpen=swCur}
  else{wb.style.transform='translateX(0)';swCur.classList.remove('swiped');swOpen=null}
  swCur=null;
});
document.addEventListener('click',function(e){
  var btn=e.target.closest('.ws-btn');
  if(btn){setPref(parseInt(btn.dataset.w),btn.dataset.act);return}
  if(!e.target.closest('.word-swipe'))closeSw();
  if(!wasSw){
    var wb=e.target.closest('.word-block');
    if(wb){
      var swEl=wb.closest('.word-swipe');
      if(swEl&&swEl.classList.contains('swiped')){closeSw(swEl)}
      else{var m=wb.id.match(/wb(\d+)/);if(m)playSingleW(parseInt(m[1]))}
    }
  }
  wasSw=false;
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

renderHome();
</script>
</body>
</html>
